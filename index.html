{day:18, type:'task', defPal:'bk', taskIds:[12], pills:['PRODUCT LAUNCH','CAMPAIGN MGMT'],
 cover:{hook:'Launch day is set.',sub:'THE SYSTEM ISN\'T READY.',tag:''},
 why:'A multi-channel product launch campaign — when built properly — doesn\'t rely on any single channel. It layers email, social, landing page, and conversion tracking so that even if one channel underperforms, the others carry the result.',
 stepsA:[{n:'01',head:'Write the campaign strategy brief',body:'LibreOffice Writer: objective, audience, key message, offer, CTA, timeline. This single doc aligns every channel. If it can\'t fit on 2 pages, the campaign isn\'t focused enough.'},
          {n:'02',head:'Define UTM taxonomy + set up GA4',body:'Agree UTM naming convention. Document in LibreOffice Calc "UTM Registry". Set up GA4 conversion event for form submission. Confirm in DebugView before day one — not on launch day.'},
          {n:'03',head:'Build the landing page brief',body:'Headline · Subheadline · 3 benefit bullets · Social proof element · Form fields (minimum: name + email) · CTA button text. Brief the developer or build in WordPress.'}],
 stepsB:[{n:'04',head:'Build 5-email Mautic sequence',body:'Day 0: Announcement. Day 2: Value proof. Day 5: FAQ/Objection handler. Day 8: Social proof/testimonial. Day 12: Last chance. All UTM-tagged. Segment: "Launch Campaign — Email List".'},
          {n:'05',head:'Schedule 12 social posts in Buffer',body:'Teaser ×3, Launch ×2, Proof ×3, Reminder ×2, Close ×2. Spread over 14 days. Platform-specific copy. Create master campaign checklist: asset, owner, deadline, live/not-live status.'},
          {n:'06',head:'Launch day + 7-day check',body:'Publish LP. Activate Mautic. Confirm Buffer queue. Post manually on LinkedIn. After 7 days: pull GA4 + Mautic stats. Record against targets. What worked and what didn\'t — document before you move on.'}],
 tools:'Mautic · Buffer (free tier) · Google Analytics 4 · WordPress · LibreOffice Writer + Calc · Brand assets',
 output:'Campaign strategy brief (PDF). UTM Registry (XLSX). Mautic 5-email sequence active. Buffer: 12 posts over 14 days. GA4 conversion event confirmed. 7-day report vs targets.',
 close:'A launch without a system is just an announcement.',
 caption:`Launch day is set. The system isn't ready.

A multi-channel product launch isn't about the day — it's about the infrastructure before it. Campaign strategy brief → UTM registry → landing page → 5-email Mautic sequence (Days 0, 2, 5, 8, 12) → 12 Buffer posts over 14 days → GA4 conversion event confirmed before go-live.

Every element tracked. Every channel aligned. 7-day report pulled before you move to the next thing.

A launch without a system is just an announcement.

#productlaunch #campaignmanagement #emailmarketing #digitalmarketing #marketingstrategy #gtm #foundermarketing`},

{day:20, type:'task', defPal:'cr', taskIds:[13,32], pills:['CONTENT STRATEGY','AI BRIEFS'],
 cover:{hook:'52 topics.',sub:'ZERO GUESSWORK.',tag:''},
 why:'A 6-month content strategy built on data — not intuition — means every piece published serves a pillar, targets a keyword, and links to the pieces around it. The AI brief generator then turns strategy into executable briefs in under 3 hours.',
 stepsA:[{n:'01',head:'Audit + define content pillars',body:'Export GSC data (last 6 months). Identify top 10 traffic-driving posts. From those patterns + business objectives: define 3–4 content pillars. Each pillar = one problem your audience cares about.'},
          {n:'02',head:'Build topic clusters',body:'Per pillar: 1 cornerstone piece (2,000+ words) + 5–8 supporting articles. Keyword viability: use GSC near-miss data (Position 11–30). Each supporting piece links back to the cornerstone.'},
          {n:'03',head:'Build 52-topic editorial calendar',body:'LibreOffice Calc. Columns: Publish Date · Pillar · Topic/Title · Target Keyword · Format · Writer · Status · Target Organic Traffic. 2 posts/week = 52 topics over 6 months.'}],
 stepsB:[{n:'04',head:'Generate AI content briefs',body:'Claude.ai prompt: "Create a content brief for keyword [KEYWORD]. Include: secondary keywords (5–8), search intent, recommended word count, H1 title, 5–7 H2 subheadings, 3 internal link suggestions, 3 tips to outperform competing URLs. Output as JSON."'},
          {n:'05',head:'Test + refine the prompt',body:'Run on 3 topics first. Check: are headings logical? Are secondary keywords relevant? Refine until output passes your quality bar. Then run for all 10 near-miss priority keywords. Save the final prompt.'},
          {n:'06',head:'Set KPIs + governance',body:'KPIs per pillar: organic traffic target, avg time on page, backlink target. Governance doc: brief template, review checklist, approval stages, publishing SOP. Assign briefs to writers in Trello.'}],
 tools:'Google Search Console (free) · Claude.ai / Gemini (free tier) · LibreOffice Calc + Writer · Trello (free)',
 output:'6-month editorial calendar XLSX (52 topics). Topic cluster map per pillar. KPI table. AI content brief generator prompt saved. 10 briefs generated + assigned in Trello.',
 close:'Strategy without a calendar is a document. A calendar without a strategy is a schedule.',
 caption:`52 topics. Zero guesswork.

A 6-month content strategy built on data: GSC audit → 3–4 content pillars → topic clusters (1 cornerstone + 5–8 supporting articles per pillar) → 52-topic editorial calendar. Then pair it with an AI SEO brief generator — Claude.ai turns each near-miss keyword into a full content brief in under 3 minutes.

Result: every piece published serves a pillar, targets a proven keyword, and links to the pieces around it.

Strategy without a calendar is a document. A calendar without a strategy is a schedule.

#contentstrategy #seo #contentmarketing #aimarketing #contentplanning #googleSearchConsole #digitalmarketing`},

{day:22, type:'task', defPal:'bk', taskIds:[14], pills:['ANNUAL BUDGET','ROI MODEL'],
 cover:{hook:'Next year\'s budget is due.',sub:'LAST YEAR\'S NUMBERS WON\'T CUT IT.',tag:''},
 why:'An annual marketing budget built with a 3-scenario ROI model gives you something most marketing teams don\'t have: a credible answer to "what do we get for this?" before the money is spent, not after.',
 stepsA:[{n:'01',head:'Gather inputs',body:'Prior year actual spend by channel. Revenue generated per channel (from UTMs + CRM). Conversion rates per channel. Next year revenue target. These four inputs determine everything else.'},
          {n:'02',head:'Build channel allocation table',body:'LibreOffice Calc. Rows = channels. Columns = Allocated Budget · Est. Leads · Est. CPL · Est. Conversion to Customer · Est. Revenue Contribution. Every number needs a source or an assumption label.'},
          {n:'03',head:'Build the 3-scenario model',body:'Bear = −20% budget. Base = approved budget. Bull = +20% budget. Use input cell multipliers so scenarios update automatically. ROI formula per channel: =(Revenue Contribution − Channel Spend) / Channel Spend. Flag ROI < 1.0 in red.'}],
 stepsB:[{n:'04',head:'Add benchmarks',body:'Research industry-average CPL and marketing-to-revenue ratios for your category. Document sources. Any channel benchmarking above industry average should have a justification — not just a higher number.'},
          {n:'05',head:'Build summary: blended marketing ROI',body:'Total Spend row. Total Revenue Attributed row. Blended Marketing ROI = (Total Revenue − Total Spend) / Total Spend. This single number is what the board actually wants to know.'},
          {n:'06',head:'Build 8-slide board deck',body:'LibreOffice Impress: Cover · Objectives · Budget Summary · Channel Allocation (pie chart) · ROI by Channel · 3 Scenarios · Risks & Assumptions · Recommended Approval. Export PDF + PPTX.'}],
 tools:'LibreOffice Calc + Impress · Google Analytics 4 · SuiteCRM or Odoo CRM · Industry benchmark sources',
 output:'LibreOffice Calc: 3-scenario ROI model, zero formula errors. 8-slide board deck (PDF) with charts. All assumptions documented. Delivered 2 weeks before fiscal year-end.',
 close:'The board doesn\'t want a budget. They want to know what the budget buys.',
 caption:`Next year's budget is due. Last year's numbers won't be enough.

A 3-scenario marketing ROI model gives you a credible answer before the money is spent: Bear (−20%), Base, Bull (+20%). ROI formula per channel: (Revenue − Spend) ÷ Spend. Any channel under 1.0× gets questioned. Blended marketing ROI ties it all together for the board.

8-slide deck: objectives, channel allocation, ROI by channel, 3 scenarios, risks and assumptions, recommendation.

The board doesn't want a budget. They want to know what it buys.

#marketingbudget #marketingroi #boarddeck #annualplanning #marketingstrategy #b2bmarketing #businessgrowth`},

{day:24, type:'task', defPal:'cr', taskIds:[15], pills:['NPS SURVEY','CUSTOMER RESEARCH'],
 cover:{hook:'You think you know what customers think.',sub:'YOU HAVEN\'T ASKED.',tag:''},
 why:'A properly structured customer survey — with NPS, brand perception ratings, and product satisfaction questions — gives you data that no analytics tool can: the reason behind the number. The NPS score tells you there\'s a problem. The open-ended questions tell you what it is.',
 stepsA:[{n:'01',head:'Define objectives + write questions',body:'Objective first: what decisions will this data inform? 15–20 questions: 1 NPS (0–10), 3–5 brand perception ratings (1–5), 3–5 product satisfaction questions, 2–3 open-ended, demographic questions. Sequence matters.'},
          {n:'02',head:'Build + test in Google Forms',body:'Logic: NPS first (warm-up), satisfaction questions in the middle, open-ended last (when trust is established). Test internally with 5 people before sending. Check for ambiguous questions — if anyone asks what a question means, rewrite it.'},
          {n:'03',head:'Send + collect responses',body:'Send via Mautic or Gmail to customer list. Target: minimum 50 responses. Keep survey open 5–10 days. Send one reminder at Day 3. Clear subject line: "2 minutes — we want to know what you actually think."'}],
 stepsB:[{n:'04',head:'Calculate NPS',body:'NPS = % Promoters (9–10) − % Detractors (0–6). Segment: Promoters (leverage), Passives (convert), Detractors (call within 48h). Average each rating question by customer tenure and type.'},
          {n:'05',head:'Analyse open-ended responses',body:'Read all. Categorise into themes. Count frequency. Top 3 positive themes = what you\'re doing right. Top 3 negative themes = your next product sprint. This takes 2 hours and is worth more than any dashboard.'},
          {n:'06',head:'Write strategic recommendations report',body:'LibreOffice Writer: Methodology · Key Findings (charts) · NPS Breakdown · Open-Ended Themes · 5 Strategic Recommendations (prioritised by impact + ease). Export PDF. Present to Product and CS teams.'}],
 tools:'Google Forms (free) · LibreOffice Calc + Writer · Mautic or Gmail · Minimum 50 responses · Customer email list',
 output:'Google Form (15–20 questions) live. Cleaned CSV in LibreOffice Calc. NPS score with segment breakdown. PDF strategic report (8–10 pages) with 5 recommendations.',
 close:'The customer who gives you a 6 is trying to tell you something. Are you listening?',
 caption:`You think you know what customers think. You haven't asked.

A structured customer survey — 1 NPS, 3–5 brand perception ratings, 3–5 product satisfaction questions, 2–3 open-ended — gives you data no analytics tool can: the reason behind the number.

Minimum 50 responses. 5–10 days open. NPS calculated: % Promoters − % Detractors. Open-ended themes categorised and counted. Top 3 negative themes = your next product sprint. Strategic recommendations report delivered to Product and CS teams.

The customer who gives you a 6 is trying to tell you something.

#nps #customerresearch #productmarketing #customerexperience #marketresearch #founderlessons #businessgrowth`},

{day:26, type:'task', defPal:'bk', taskIds:[16,21], pills:['SUITECRM','PIPELINE REVIEW'],
 cover:{hook:'Your pipeline has 140 deals.',sub:'HALF OF THEM SHOULDN\'T BE THERE.',tag:''},
 why:'A CRM full of stale deals produces a forecast full of false confidence. Cleaning the pipeline and running a deal health scorecard gives you a number you can actually stand behind — and a list of the 10 deals most likely to slip before quarter-end.',
 stepsA:[{n:'01',head:'Export full pipeline',body:'SuiteCRM → Opportunities → All Users → All Time. Export CSV: Name, Account, Stage, Amount, Close Date, Assigned User, Last Modified. Add "Days Since Last Modified" formula in LibreOffice Calc.'},
          {n:'02',head:'Flag stale + overdue deals',body:'Days Since Modified >90 = "Stale" flag. Close Date past + Status still Open = "Overdue" flag. For each stale deal: open in SuiteCRM, update Stage or mark "Closed Lost" with reason. Re-assign orphaned records via Mass Update.'},
          {n:'03',head:'Build deal health scorecard',body:'6 binary criteria (0/1): Last activity >14 days ago · Close date <30 days · Stage matches timeline · Decision maker engaged · Competitor mentioned · Proposal sent. Total: 0–2 = At Risk (red), 3–4 = Uncertain (amber), 5–6 = Healthy (green).'}],
 stepsB:[{n:'04',head:'Calculate health-weighted forecast',body:'EoQ close probability = Base Stage Probability × Health Multiplier (At Risk ×0.5, Uncertain ×0.75, Healthy ×1.0). Sum weighted values = your honest EoQ forecast number.'},
          {n:'05',head:'Identify top 10 at-risk deals',body:'Sort by (Amount × Base Probability) where Health Score ≤2. These are your highest-value deals most likely to slip. Document recommended action per deal: call, escalate, re-qualify, or close lost.'},
          {n:'06',head:'Build QBR deck (8 slides)',body:'Pipeline Overview · Health Distribution (pie chart) · EoQ Forecast vs Target · Top 10 At-Risk with actions · Interventions · Team Performance · Q+1 Outlook. Export PDF. Present at QBR.'}],
 tools:'SuiteCRM (free, admin access) · LibreOffice Calc + Impress · Agreed stage probability table · Quarterly revenue target',
 output:'SuiteCRM: zero stale or orphaned records. LibreOffice Calc: all deals scored 0–6, EoQ weighted forecast. Top 10 at-risk with actions. QBR PDF deck (8 slides).',
 close:'A clean pipeline is not an optimistic pipeline. It\'s an honest one.',
 caption:`Your pipeline has 140 deals. Half of them shouldn't be there.

Pipeline cleanup + QBR deal health scoring: export → flag stale (>90 days no activity) and overdue → update or close lost → score remaining deals on 6 criteria (last activity, close date alignment, DM engaged, competitor, proposal sent, next step) → calculate health-weighted EoQ forecast → identify top 10 at-risk deals → build 8-slide QBR deck.

A clean pipeline isn't an optimistic one. It's an honest one.

#salesmanagement #pipelinemanagement #suitecrm #qbr #revenueoperations #b2bsales #salesstrategy`},

const ALL_DATA = [...DATA.map(c=>({...c,type:'insight'})), ...TASK_DATA]
  .sort((a,b)=>a.day-b.day);

function pal(c){ return curPal || c.defPal; }

function arcSVG(p){
  return `<svg style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1;" viewBox="0 0 540 540" fill="none"><circle cx="540" cy="0" r="300" stroke="${p==='cr'?'#0F0C08':'#F2E8D5'}" stroke-width="1" opacity="0.07"/><circle cx="540" cy="0" r="180" stroke="${p==='cr'?'#0F0C08':'#F2E8D5'}" stroke-width="0.75" opacity="0.04"/></svg>`;
}
function cornerSVG(p){
  return `<svg style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1;" viewBox="0 0 540 540" fill="none"><path d="M44 80 L44 44 L80 44" stroke="${p==='cr'?'#0F0C08':'#F2E8D5'}" stroke-width="2" opacity="0.2"/><path d="M496 460 L496 496 L460 496" stroke="${p==='cr'?'#0F0C08':'#F2E8D5'}" stroke-width="2" opacity="0.2"/></svg>`;
}
function lbarHTML(p){
  return `<div style="position:absolute;top:0;left:0;width:5px;height:100%;background:${p==='cr'?'#0F0C08':'#F2E8D5'};opacity:${p==='cr'?'.45':'.35'};z-index:2;"></div>`;
}
function brandTop(p){ return `<div class="brand-top cv-handle ${p==='cr'?'tp':'tm'}" style="font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.12em;opacity:.55;text-align:center;margin-bottom:14px;position:relative;z-index:3;">${H}</div>`; }
function brandBtm(p){ return `<div style="position:absolute;bottom:22px;left:32px;font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.1em;opacity:.45;z-index:3;" class="${p==='cr'?'tm':'tm'}">${H}</div>`; }
function slideNum(n,total,p){ return `<div style="position:absolute;top:18px;right:26px;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.1em;z-index:3;opacity:.4;" class="${p==='cr'?'ts':'ts'}">${n}/${total}</div>`; }

function buildCover(c){
  const p=pal(c);
  const fs1 = c.cvScript.length > 12 ? 58 : 72;
  const fs2 = c.cvBebas.length > 14 ? 74 : 96;
  return `<div class="slide ${p} s-cover on" style="display:flex;">
    ${arcSVG(p)}${lbarHTML(p)}
    ${brandTop(p)}
    <div style="flex:1;display:flex;flex-direction:column;justify-content:center;padding:0 4px 0 10px;position:relative;z-index:2;">
      <span style="font-family:'Playfair Display',serif;font-style:italic;font-weight:900;font-size:${fs1}px;line-height:.93;letter-spacing:-.02em;" class="tp">${c.cvScript}</span>
      <span style="font-family:'Bebas Neue',sans-serif;font-size:${fs2}px;line-height:.88;letter-spacing:.02em;margin-top:6px;" class="tp">${c.cvBebas}</span>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:flex-end;min-height:32px;position:relative;z-index:3;">
      ${c.cvTag?`<span style="font-family:'DM Sans',sans-serif;font-weight:500;font-size:12px;" class="tm">${c.cvTag}</span>`:'<span></span>'}
      <div style="display:flex;gap:8px;">
        <span class="pill" style="position:relative;transform:rotate(-2deg);">${c.pills[0]}</span>
        <span class="pill" style="position:relative;transform:rotate(2deg);">${c.pills[1]}</span>
      </div>
    </div>
  </div>`;
}

function buildCoverBleed(c){
  const p=pal(c);
  // Ghost word = first meaningful word from cvBebas
  const ghost = c.cvBebas.replace(/[^A-Z0-9]/g,'').slice(0,6) || c.pills[0].split(' ')[0];
  const tp  = p==='cr' ? '#0F0C08' : '#F2E8D5';
  const ts  = p==='cr' ? '#3D3020' : '#C4B49A';
  const tm  = p==='cr' ? '#7A6A55' : '#5A4E40';
  const ghostOp = p==='cr' ? '0.05' : '0.04';
  const lbarOp  = p==='cr' ? '0.45' : '0.35';
  const fs1 = c.cvScript.length > 14 ? 52 : c.cvScript.length > 10 ? 62 : 74;
  const fs2 = c.cvBebas.length  > 16 ? 68 : c.cvBebas.length  > 12 ? 80 : 96;
  return `<div class="slide ${p} s-cover on" style="display:flex;position:relative;overflow:hidden;">
    <!-- ghost word bleed -->
    <div style="position:absolute;font-family:'Bebas Neue',sans-serif;font-size:220px;line-height:1;opacity:${ghostOp};top:-18px;left:-8px;pointer-events:none;z-index:1;white-space:nowrap;color:${tp};">${ghost}</div>
    <!-- left accent bar -->
    <div style="position:absolute;top:0;left:0;width:5px;height:100%;background:${tp};opacity:${lbarOp};z-index:2;"></div>
    <!-- handle top-left -->
    <div style="position:absolute;top:22px;left:22px;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.12em;color:${tm};opacity:.6;z-index:4;">${H}</div>
    <!-- pill top-right -->
    <div style="position:absolute;top:20px;right:20px;font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.1em;padding:5px 11px;border-radius:100px;z-index:5;color:${tp};background:${p==='cr'?'rgba(15,12,8,.07)':'rgba(242,232,213,.08)'};border:1.5px solid ${p==='cr'?'rgba(15,12,8,.18)':'rgba(242,232,213,.2)'};">${c.pills[0]}</div>
    <!-- main type -->
    <div style="flex:1;display:flex;flex-direction:column;justify-content:center;padding:56px 28px 28px 22px;position:relative;z-index:3;">
      <span style="font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:${tm};opacity:.55;margin-bottom:16px;display:block;">${c.subniche.split('·')[0].trim()}</span>
      <span style="font-family:'Playfair Display',serif;font-style:italic;font-weight:900;font-size:${fs1}px;line-height:.93;letter-spacing:-.02em;color:${tp};display:block;">${c.cvScript}</span>
      <span style="font-family:'Bebas Neue',sans-serif;font-size:${fs2}px;line-height:.88;letter-spacing:.02em;margin-top:6px;color:${tp};display:block;">${c.cvBebas}</span>
      ${c.cvTag?`<span style="font-family:'DM Sans',sans-serif;font-weight:500;font-size:13px;color:${ts};margin-top:16px;display:block;">${c.cvTag}</span>`:''}
    </div>
    <!-- bottom: day label -->
    <div style="position:absolute;bottom:22px;right:24px;font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.1em;color:${tm};opacity:.45;z-index:4;">DAY ${String(c.day).padStart(2,'0')} / 30</div>
  </div>`;
}

function buildSetup(c,n,tot){
  const p=pal(c);
  return `<div class="slide ${p} s-int">
    ${slideNum(n,tot,p)}${brandBtm(p)}

  if(c.type==='task') return buildTaskSlides(c);

    buildReality(c,4,TOT),       // 4 — Reality (NEW)

    buildMistake(c,6,TOT),       // 6 — Mistake (NEW)
    buildFix(c,7,TOT),           // 7 — Fix / Steps (NEW)
    buildShift(c,8,TOT),         // 8 — Shift
    buildAction(c,9,TOT),        // 9 — One Move (NEW)
    buildClose(c,10,TOT)         // 10 — Close
  ];

  return slides.map((s,i) => {
    if(i===0) return s;
    return s.replace(/(<div class="slide [^"]*"[^>]*style=")(display:flex;)/, '$1display:none;');
  }).join('');
}

async function captureSlide(){
  const sw = document.getElementById('sw');
  const activeSlide = sw.querySelector('.slide.on');
  if(!activeSlide) return null;

  // Wait for all fonts to be ready
  await document.fonts.ready;

  // Build an isolated render div positioned offscreen
  const wrap = document.createElement('div');
  wrap.style.cssText = 'position:fixed;left:-9999px;top:0;width:540px;height:540px;overflow:hidden;pointer-events:none;z-index:-1;';
  
  // Clone the slide and reset positioning so html2canvas sees it as a normal block
  const clone = activeSlide.cloneNode(true);
  clone.style.cssText = [
    'display:flex !important',
    'position:relative !important',
    'top:0 !important',
    'left:0 !important',
    'width:540px !important',
    'height:540px !important',
    'overflow:hidden !important',
    'flex-direction:column !important'
  ].join(';');

  wrap.appendChild(clone);
  document.body.appendChild(wrap);

  // Short settle time for layout + fonts
  await new Promise(r => setTimeout(r, 120));

  let canvas;
  try {
    canvas = await html2canvas(clone, {
      width: 540,
      height: 540,
      scale: 2,
      useCORS: true,
      allowTaint: true,
      logging: false,
      removeContainer: true
    });
  } finally {
    document.body.removeChild(wrap);
  }
  return canvas;
}

function triggerDownload(canvas){
  const link = document.createElement('a');
  link.download = getFilename('png');
  link.href = canvas.toDataURL('image/png');
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}

async function copySlideImage(){
  const btn = document.getElementById('btn-copy-img');
  btn.disabled = true;
  btn.innerHTML = '⏳ RENDERING...';
  try {
    const canvas = await captureSlide();
    if(!canvas){ setBtn('btn-copy-img', COPY_BTN_HTML); return; }

    // Try native clipboard API first
    let copied = false;
    if(window.ClipboardItem){
      try {
        const blob = await new Promise(res => canvas.toBlob(res, 'image/png'));
        await navigator.clipboard.write([new ClipboardItem({'image/png': blob})]);
        showFeedback('✓ COPIED TO CLIPBOARD');
        copied = true;
      } catch(e){ /* fall through to download */ }
    }
    // Fallback: download
    if(!copied){
      triggerDownload(canvas);
      showFeedback('↓ SAVED — clipboard blocked by browser');
    }
  } catch(err){
    showFeedback('✗ ERROR — try DOWNLOAD instead');
    console.error(err);
  }
  setBtn('btn-copy-img', COPY_BTN_HTML);
}

      showFeedback('↓ DOWNLOADED');
    }
  } catch(err){
    showFeedback('✗ ERROR — try again');
    console.error(err);

}
