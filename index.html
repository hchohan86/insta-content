<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>30 Carousels — @haseebwrites</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Playfair+Display:ital,wght@1,700;1,900&family=Poppins:wght@800;900&family=DM+Sans:wght@400;500;600&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0A0907;font-family:'DM Sans',sans-serif;min-height:100vh;}

/* ===== INDEX ===== */
#idx{padding:40px 28px 60px;}
.idx-hd{text-align:center;margin-bottom:40px;}
.idx-hd h1{font-family:'Bebas Neue',sans-serif;font-size:52px;letter-spacing:3px;color:#F2E8D5;}
.idx-hd p{font-family:'Space Mono',monospace;font-size:11px;color:#5A4E40;margin-top:6px;letter-spacing:.1em;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:3px;max-width:1200px;margin:0 auto;}

/* Card = square thumbnail */
.card{position:relative;cursor:pointer;overflow:hidden;aspect-ratio:1/1;background:#0A0907;}
.card:hover .card-overlay{opacity:1;}
.card:hover .thumb-inner{transform:scale(1.03);}

/* Thumbnail: scale a 540×540 slide down to fill the card */
.thumb-wrap{position:absolute;inset:0;overflow:hidden;}
.thumb-sizer{
  position:absolute;
  top:0;left:0;
  width:540px;height:540px;
  transform-origin:top left;
  pointer-events:none;
}

/* Hover overlay with metadata */
.card-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to top, rgba(0,0,0,.85) 0%, rgba(0,0,0,.2) 50%, transparent 100%);
  opacity:0;transition:opacity .2s;
  display:flex;flex-direction:column;justify-content:flex-end;
  padding:12px 10px;z-index:10;
}
.card-day{font-family:'Space Mono',monospace;font-size:9px;color:rgba(242,232,213,.5);letter-spacing:.1em;margin-bottom:4px;}
.card-hl{font-family:'Poppins',sans-serif;font-weight:900;font-size:11px;color:#F2E8D5;line-height:1.3;margin-bottom:6px;}
.card-sub{font-family:'DM Sans',sans-serif;font-size:10px;color:rgba(196,180,154,.7);line-height:1.3;}
.card-type{display:inline-block;font-family:'Space Mono',monospace;font-size:7px;letter-spacing:.1em;padding:2px 7px;border-radius:2px;margin-bottom:5px;}
.ct-ins{background:rgba(242,232,213,.12);color:#C4B49A;}
.ct-task{background:rgba(80,200,120,.15);color:#6DBF88;}
.card-pal{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:4px;vertical-align:middle;}
.pal-b{background:#0A0907;border:1px solid #3D3020;}
.pal-c{background:#F2E8D5;}

/* ===== VIEWER ===== */
#vwr{display:none;flex-direction:column;align-items:center;padding:28px 20px 50px;min-height:100vh;}
.vwr-top{display:flex;align-items:center;gap:12px;margin-bottom:22px;width:540px;max-width:100%;}
.btn-back{font-family:'Space Mono',monospace;font-size:10px;color:#5A4E40;cursor:pointer;background:none;border:1px solid rgba(242,232,213,.1);padding:7px 14px;letter-spacing:.08em;transition:all .15s;}
.btn-back:hover{color:#F2E8D5;border-color:rgba(242,232,213,.3);}
.vwr-day{font-family:'Space Mono',monospace;font-size:10px;color:#3D3020;letter-spacing:.1em;}
.vwr-title{font-family:'Poppins',sans-serif;font-weight:800;font-size:12px;color:#C4B49A;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.pal-tog{display:flex;gap:6px;}
.ptbtn{font-family:'Space Mono',monospace;font-size:9px;padding:6px 12px;cursor:pointer;border:1px solid rgba(242,232,213,.12);background:none;color:#5A4E40;letter-spacing:.08em;transition:all .15s;}
.ptbtn:hover{color:#C4B49A;border-color:rgba(242,232,213,.25);}
.ptbtn.on{background:rgba(242,232,213,.08);color:#F2E8D5;border-color:rgba(242,232,213,.35);}

/* ===== SLIDE WRAPPER ===== */
.sw{position:relative;width:540px;height:540px;max-width:100%;}
@media(max-width:580px){.sw{width:calc(100vw - 40px);height:calc(100vw - 40px);}}

/* ===== SLIDE BASE ===== */
.slide{display:none;position:absolute;top:0;left:0;width:100%;height:100%;overflow:hidden;flex-direction:column;}
.slide.on{display:flex;}

/* CREAM */
.cr{background:#F2E8D5;}
.cr .tp{color:#0F0C08;}
.cr .ts{color:#3D3020;}
.cr .tm{color:#7A6A55;}
.cr .pill{background:rgba(15,12,8,.07);border:1.5px solid rgba(15,12,8,.18);color:#0F0C08;}
.cr .bgn{color:#0F0C08;opacity:.045;}
.cr .stripe{background:#0F0C08;opacity:.07;}
.cr .cmk{stroke:#0F0C08;stroke-opacity:.18;}
.cr .arc{stroke:#0F0C08;}
.cr .lbar{background:#0F0C08;opacity:.45;}
.cr .hline{background:rgba(15,12,8,.1);}

/* BLACK */
.bk{background:#0A0907;}
.bk .tp{color:#F2E8D5;}
.bk .ts{color:#C4B49A;}
.bk .tm{color:#5A4E40;}
.bk .pill{background:rgba(242,232,213,.08);border:1.5px solid rgba(242,232,213,.2);color:#F2E8D5;}
.bk .bgn{color:#F2E8D5;opacity:.04;}
.bk .stripe{background:#F2E8D5;opacity:.06;}
.bk .cmk{stroke:#F2E8D5;stroke-opacity:.16;}
.bk .arc{stroke:#F2E8D5;}
.bk .lbar{background:#F2E8D5;opacity:.4;}
.bk .hline{background:rgba(242,232,213,.08);}

/* COVER */
.s-cover{padding:28px 30px 30px;justify-content:space-between;}
.cv-top{text-align:center;}
.cv-handle{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.12em;opacity:.5;}
.cv-mid{flex:1;display:flex;flex-direction:column;justify-content:center;padding:10px 0;}
.cv-script{font-family:'Playfair Display',serif;font-style:italic;font-weight:900;line-height:.93;letter-spacing:-.02em;}
.cv-bebas{font-family:'Bebas Neue',sans-serif;line-height:.9;letter-spacing:.02em;}
.cv-bot{display:flex;justify-content:space-between;align-items:flex-end;min-height:32px;}
.cv-tag{font-family:'DM Sans',sans-serif;font-weight:500;font-size:12px;}
.pill{position:absolute;font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.08em;padding:5px 11px;border-radius:100px;pointer-events:none;z-index:6;white-space:nowrap;}

/* INTERIOR BASE */
.s-int{padding:44px;justify-content:center;}
.sn{position:absolute;top:18px;right:26px;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.1em;z-index:3;}
.bh{position:absolute;bottom:22px;left:32px;font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.1em;opacity:.45;z-index:3;}
.slabel{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.15em;text-transform:uppercase;opacity:.55;margin-bottom:14px;display:block;}

/* SETUP */
.setup-body{font-family:'DM Sans',sans-serif;font-size:17px;line-height:1.65;position:relative;z-index:2;}

/* PROBLEM */
.prob-head{font-family:'Bebas Neue',sans-serif;font-size:52px;line-height:.92;letter-spacing:.01em;position:relative;z-index:2;margin-bottom:14px;}
.prob-body{font-family:'DM Sans',sans-serif;font-size:15px;line-height:1.65;position:relative;z-index:2;}

/* STAT */
.s-stat{position:relative;}
.stat-bgn{position:absolute;font-family:'Bebas Neue',sans-serif;font-size:220px;line-height:1;right:-15px;bottom:-35px;pointer-events:none;z-index:1;}
.stat-label{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.15em;text-transform:uppercase;margin-bottom:10px;display:block;position:relative;z-index:2;opacity:.55;}
.stat-num{font-family:'Bebas Neue',sans-serif;font-size:100px;line-height:.88;position:relative;z-index:2;letter-spacing:.01em;}
.stat-ctx{font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.6;margin-top:18px;position:relative;z-index:2;}

/* SHIFT */
.shift-line{height:1px;width:48px;margin-bottom:18px;position:relative;z-index:2;}
.shift-head{font-family:'Bebas Neue',sans-serif;font-size:46px;line-height:.92;letter-spacing:.01em;position:relative;z-index:2;margin-bottom:16px;}
.shift-body{font-family:'DM Sans',sans-serif;font-size:15px;line-height:1.65;position:relative;z-index:2;}

/* CLOSE */
.s-close{position:relative;}
.close-prin{font-family:'Playfair Display',serif;font-style:italic;font-weight:700;font-size:24px;line-height:1.42;margin-bottom:24px;position:relative;z-index:2;}
.close-cta{font-family:'DM Sans',sans-serif;font-size:12px;letter-spacing:.05em;opacity:.5;position:relative;z-index:2;}

/* ===== CONTROLS ===== */
.ctrl{display:flex;align-items:center;justify-content:space-between;margin-top:18px;width:540px;max-width:100%;}
.cbtn{font-family:'Space Mono',monospace;font-size:10px;cursor:pointer;background:none;border:1px solid rgba(242,232,213,.12);padding:8px 18px;color:#5A4E40;letter-spacing:.08em;transition:all .15s;}
.cbtn:hover:not(:disabled){border-color:rgba(242,232,213,.3);color:#C4B49A;}
.cbtn:disabled{opacity:.2;cursor:default;}
.dots{display:flex;gap:7px;align-items:center;}
.dot{width:5px;height:5px;border-radius:50%;background:#2a2828;cursor:pointer;transition:all .15s;}
.dot.on{background:#C4B49A;width:18px;border-radius:3px;}

/* ===== CAROUSEL NAV STRIP ===== */
.cnav{display:flex;gap:10px;margin-top:20px;align-items:center;font-family:'Space Mono',monospace;font-size:10px;color:#3D3020;letter-spacing:.08em;}
.cnav-btn{cursor:pointer;border:1px solid rgba(242,232,213,.1);padding:6px 14px;background:none;color:#5A4E40;font-family:'Space Mono',monospace;font-size:10px;transition:all .15s;letter-spacing:.08em;}
.cnav-btn:hover{color:#C4B49A;border-color:rgba(242,232,213,.25);}
.cnav-btn:disabled{opacity:.2;cursor:default;}
/* ===== CAPTION PANEL ===== */
.cap-panel{width:540px;max-width:100%;margin-top:28px;background:#0F0C08;border:1px solid rgba(242,232,213,.08);padding:24px;}
.cap-label{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:#3D3020;margin-bottom:14px;display:block;}
.cap-text{font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.75;color:#C4B49A;white-space:pre-wrap;word-break:break-word;}
.cap-actions{display:flex;gap:8px;margin-top:16px;align-items:center;}
.cap-copy{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.1em;padding:8px 18px;background:none;border:1px solid rgba(242,232,213,.18);color:#C4B49A;cursor:pointer;transition:all .15s;text-transform:uppercase;}
.cap-copy:hover{border-color:#F2E8D5;color:#F2E8D5;}
.cap-copied{font-family:'Space Mono',monospace;font-size:9px;color:#5A4E40;letter-spacing:.08em;opacity:0;transition:opacity .3s;}
.cap-copied.show{opacity:1;}

/* ===== IMAGE TOOLBAR ===== */
.img-toolbar{width:540px;max-width:100%;display:flex;gap:8px;margin-top:10px;align-items:center;}
.img-btn{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.1em;padding:9px 18px;background:none;border:1px solid rgba(242,232,213,.15);color:#C4B49A;cursor:pointer;transition:all .15s;text-transform:uppercase;display:flex;align-items:center;gap:7px;white-space:nowrap;}
.img-btn:hover{border-color:#F2E8D5;color:#F2E8D5;}
.img-btn:disabled{opacity:.25;cursor:default;}
.img-btn svg{flex-shrink:0;}
.img-feedback{font-family:'Space Mono',monospace;font-size:9px;color:#5A4E40;letter-spacing:.08em;opacity:0;transition:opacity .3s;margin-left:4px;}
.img-feedback.show{opacity:1;}
.img-filename{font-family:'Space Mono',monospace;font-size:9px;color:#3D3020;letter-spacing:.06em;margin-left:auto;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:220px;}
</style>
</head>
<body>

<!-- INDEX -->
<div id="idx">
  <div class="idx-hd">
    <h1>45 CAROUSELS</h1>
    <p>@HASEEBCH49 · 30 INSIGHT · 15 TASK · MONTH 1 OF 6</p>
  </div>
  <div class="grid" id="grid"></div>
</div>

<!-- VIEWER -->
<div id="vwr">
  <div class="vwr-top">
    <button class="btn-back" onclick="showIdx()">← ALL</button>
    <span class="vwr-day" id="vday"></span>
    <span class="vwr-title" id="vtitle"></span>
    <div class="pal-tog">
      <button class="ptbtn" id="pbk" onclick="setPal('bk')">BLACK</button>
      <button class="ptbtn" id="pcr" onclick="setPal('cr')">CREAM</button>
    </div>
  </div>
  <div class="sw" id="sw"></div>
  <div class="img-toolbar">
    <button class="img-btn" id="btn-copy-img" onclick="copySlideImage()">
      <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><rect x="5" y="5" width="10" height="10" rx="1.5" stroke="currentColor" stroke-width="1.4"/><path d="M3 11H2a1 1 0 01-1-1V2a1 1 0 011-1h8a1 1 0 011 1v1" stroke="currentColor" stroke-width="1.4"/></svg>
      COPY IMAGE
    </button>
    <button class="img-btn" id="btn-dl-img" onclick="downloadSlideImage()">
      <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M8 2v8M5 7l3 3 3-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M2 12h12" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
      DOWNLOAD
    </button>
    <span class="img-feedback" id="img-feedback">✓ COPIED</span>

    <button class="cbtn" id="bp" onclick="prevS()">← PREV</button>
    <div class="dots" id="dots"></div>
    <button class="cbtn" id="bn" onclick="nextS()">NEXT →</button>
  </div>
  <div class="cnav">
    <button class="cnav-btn" id="cpb" onclick="prevC()">← PREV CAROUSEL</button>
    <span id="ccount"></span>
    <button class="cnav-btn" id="cnb" onclick="nextC()">NEXT CAROUSEL →</button>
  </div>
  <div class="cap-panel">
    <span class="cap-label">INSTAGRAM CAPTION — COPY & PASTE</span>
    <div class="cap-text" id="captext"></div>
    <div class="cap-actions">
      <button class="cap-copy" onclick="copyCaption()">COPY CAPTION</button>
      <span class="cap-copied" id="capcopied">✓ COPIED</span>
    </div>
  </div>
  <div class="cap-panel">
    <span class="cap-label">INSTAGRAM CAPTION — COPY &amp; PASTE</span>
    <div class="cap-text" id="captext"></div>
    <div class="cap-actions">
      <button class="cap-copy" onclick="copyCaption()">COPY CAPTION</button>
      <span class="cap-copied" id="capcopied">✓ COPIED</span>
    </div>
  </div>
</div>

<script>
const H = '@haseebch49';
let curC = 0, curS = 0, curPal = null;

const DATA = [
{day:1,defPal:'bk',pills:['AI IN MARKETING','AD COPY'],
 cvScript:'Your ad',cvBebas:"DIDN'T FAIL.",cvTag:'Your copy did.',subniche:'AI in Marketing · Why Marketing Fails',
 setup:{label:'THE SITUATION',body:'Most founders write one ad copy version and run it for weeks. When it underperforms, the creative gets blamed. The budget gets pulled. The test never happened.'},
 prob:{head:'NO VARIANT. NO DATA. NO LEARNING.',body:"A single copy version is not a campaign. It's a guess. And guesses don't scale. You can't learn from one data point."},
 stat:{num:'2HRS',label:'AI GENERATION TIME',ctx:"AI can generate 10 copy variants in under 2 hours. Manual effort for the same output: 2 days minimum. Generate variants, score them, deploy top 2, run 72 hours."},
 shift:{head:'THE WINNING FORMULA IS THE FASTEST TEST.',body:"Generate variants. Score them against clarity, CTA strength, and emotional pull. Deploy top 2. Let the data tell you what your opinion can't."},
 close:{prin:'Test more. Guess less.',cta:'Follow if you like thinking like this.'},
 reality:`A founder runs one Facebook ad for 6 weeks. CTR drops in week 3. They pull the budget, blame the creative, and move on. The real problem: they never tested a second version. There was no data to learn from — only a hunch that became a decision.`,
 mistake:{head:'PICKING COPY BY GUT FEEL',body:`Founders choose the version that sounds clever to them. The customer doesn't care about clever. They respond to clarity, specificity, and a CTA that matches where they are in the decision. Your preference is not market data.`},
 fix:{label:'THE 4-STEP PROCESS',steps:['Write a structured master prompt: product name, target audience, key benefit, tone, character limit, output = 10 numbered variants','Run a second prompt scoring each variant on clarity, CTA strength, and emotional pull (1–10). Let AI rank them.','Deploy top 2 variants in your email or ad platform — 50/50 split, identical everything except copy','Pull results after 72 hours. % lift = (Higher Rate − Lower Rate) ÷ Lower Rate. Save the winning formula.']},
 action:{head:'DO THIS TODAY',body:`Open Claude or Gemini. Write your master prompt. Generate 10 variants in 20 minutes. Pick the top 2 and run them against each other on your next campaign. Don't launch another single-version ad.`},
 caption:`Your ad didn't fail. Your copy did.

Most founders write one version, run it for weeks, and blame the creative when the numbers don't move. The problem is upstream — no variant means no data, and no data means no learning.

AI can generate 10 copy variants in under 2 hours. Deploy the top 2. Run 72 hours. Let the result tell you what your opinion can't.

The winning formula isn't the best line. It's the fastest test.

#marketingstrategy #digitalmarketing #adcopy #foundermarketing #growthmindset #marketingtips #businessgrowth`},

{day:2,defPal:'cr',pills:['LEAD SCORING','GTM'],
 cvScript:"You're sending",cvBebas:'EVERY LEAD',cvTag:'to sales. That\'s the problem.',subniche:'Strategy vs. Activity',
 setup:{label:'THE SITUATION',body:"Your sales team treats a pricing page visit the same as a newsletter open. Both are contacts. Only one is ready to buy. And your reps are spending equal time on both."},
 prob:{head:'UNSCORED LEADS WASTE SALES CAPACITY.',body:"When everything looks urgent, nothing is prioritised. The buyer who's ready gets the same attention as the one who opened an email by accident."},
 stat:{num:'50',label:'SCORE THRESHOLD',ctx:"Email opened = +5 pts. Pricing page = +15. Form filled = +25. Alert fires at 50. Below that — marketing's problem to nurture, not sales' problem to chase."},
 shift:{head:'SALES SHOULD ONLY SEE LEADS ABOVE THRESHOLD.',body:"Everything else is marketing's job. Lead scoring isn't a CRM feature. It's a capacity decision that determines how your team spends its day."},
 close:{prin:'The lead worth calling already told you.',cta:'Follow if you like thinking like this.'},
 reality:`A SaaS team of 4 reps spends 6 hours a day on calls. 70% of those leads opened one email. The other 30% visited the pricing page three times and filled a contact form — and nobody called them first. The reps didn't know. The CRM didn't flag it.`,
 mistake:{head:'LETTING REPS DECIDE WHO TO CALL',body:`Without a scoring system, reps follow instinct — the most recent lead, a familiar company name, whoever emailed twice. That's not a system. It's luck. And luck doesn't scale when your pipeline has 500 contacts.`},
 fix:{label:'HOW TO BUILD IT',steps:['Define 5 key behaviours and assign point values: email open = +5, pricing page = +15, form fill = +25, blog visit = +3, unsubscribe = −20','Set a threshold — 50 is a standard starting point. Below it: marketing nurtures. Above it: sales calls.','In Mautic: Contacts > Points > Manage Actions. Build each rule with the exact URL or action.','Create a campaign: score ≥50 → send internal alert to sales rep with contact details and total score']},
 action:{head:'THIS WEEK',body:`Map 5 behaviours to point values. Set a threshold. Even if it starts as a spreadsheet model — begin tracking who is actually showing buying intent versus who just opened an email.`},
 caption:`You're sending every lead to sales. That's the problem.

A pricing page visit and a newsletter open are not the same signal. When your sales team treats them equally, capacity gets wasted on the wrong people — and the buyers who are ready get lost in the queue.

Simple scoring model: email opened = +5 pts, pricing page = +15, form filled = +25. Alert fires at 50. Below that, it's marketing's job to nurture — not sales' job to chase.

Lead scoring isn't a CRM feature. It's a capacity decision.

#salesstrategy #leadgeneration #b2bmarketing #marketingautomation #founderlessons #gtm #businessgrowth`},

{day:3,defPal:'bk',pills:['BUDGET MANAGEMENT','NUMBERS'],
 cvScript:'Budget exists.',cvBebas:"TRACKER DOESN'T.",cvTag:'',subniche:'Numbers Marketing Ignores',
 setup:{label:'THE SITUATION',body:"Most marketing budgets live in a PDF or a verbal agreement. Planned spend is an estimate. Actual spend is a surprise. Nobody compares the two until it's month-end."},
 prob:{head:'YOU ONLY KNOW YOU\'RE OVER BUDGET WHEN IT\'S TOO LATE.',body:'Overruns compound. A 10% overspend in paid social funds an agency fee that funds an event. By quarter-end, the math is broken and the explanations are creative.'},
 stat:{num:'10%',label:'OVERRUN FLAG THRESHOLD',ctx:"Variance formula: (Actual − Planned) ÷ Planned. Anything over 10% gets flagged. Rs. 50,000 in untracked overruns is a strategy problem, not an accounting one."},
 shift:{head:'THE CHANNEL GOING OVER IS THE ONE YOU HAVEN\'T QUESTIONED.',body:"Budget tracking isn't accounting. It's a weekly decision tool. The red flag tells you where to look, before the spend becomes a post-mortem."},
 close:{prin:'Variance is the conversation you avoid until it becomes unavoidable.',cta:'Follow if you like thinking like this.'},
 pullQuote:"We only found out we were Rs. 80,000 over budget when the invoice landed.",
 reality:`A marketing team runs paid social, an agency retainer, and a content tool subscription. Each is tracked separately. At month-end: paid social ran Rs. 12,000 over. The agency invoice added Rs. 18,000 in scope creep. Nobody had a single view of total spend until the accounts team asked.`,
 mistake:{head:'TRACKING SPEND IN YOUR HEAD',body:`Monthly budgets get split across tools, contractors, platforms, and subscriptions. Without a single tracker with variance formulas, you're managing four separate conversations that never add up to one number until it's too late to act.`},
 fix:{label:'BUILD THE TRACKER',steps:['LibreOffice Calc: columns = Category, Channel, Planned Budget, Actual Spend, Variance (Rs.), Variance (%), Status','Add variance formulas: Column E = Actual − Planned. Column F = IF(Planned>0, (Actual−Planned)÷Planned, 0)','Status column: =IF(F>0.1,"OVER",IF(F>0,"AT RISK","ON TRACK")) with red/amber/green conditional formatting','Add a Summary tab with a bar chart: Planned vs Actual by channel. Protect formula cells.']},
 action:{head:'DO THIS NOW',body:`Open a spreadsheet. List every active marketing spend line. Enter last month's planned and actual. Add the variance formula. That single column will tell you more than any dashboard report.`},
 caption:`You have a marketing budget. You don't have a marketing tracker.

Most budgets live in a PDF or a verbal agreement. Planned spend is an estimate. Actual spend is a surprise. And by the time someone notices the overrun, the quarter is already broken.

Variance formula: (Actual − Planned) ÷ Planned. Anything over 10% gets flagged. Rs. 50,000 in untracked overruns is a strategy problem, not an accounting one.

The channel that keeps going over is the channel you haven't questioned yet.

#marketingbudget #financialplanning #marketingops #foundermarketing #businessnumbers #marketingstrategy #startupgrowth`},

{day:4,defPal:'cr',pills:['MQL / SQL','GTM'],
 cvScript:'Marketing says 200.',cvBebas:'SALES SAYS 3.',cvTag:'Neither is lying.',subniche:'Agency Reality · GTM',
 setup:{label:'THE SITUATION',body:"The handoff between marketing and sales is where revenue dies. Not because teams are incompetent — because they're measuring different things against definitions nobody agreed on."},
 prob:{head:'NO SHARED DEFINITION. NO ACCOUNTABILITY.',body:"Marketing counts form fills. Sales counts qualified conversations. Until those definitions are written and signed, both teams are right and nothing improves."},
 stat:{num:'36%',label:'HIGHER CLOSE RATES WITH A SIGNED SLA',ctx:"Companies with a formal Sales & Marketing SLA see up to 36% higher lead-to-close rates. Most SMBs have never written one. The document forces the conversation."},
 shift:{head:'MQL/SQL ISN\'T A CRM CATEGORY. IT\'S A BUSINESS AGREEMENT.',body:"The SLA doesn't create alignment. It creates accountability. That's why most companies resist writing it — and why the ones that do outperform."},
 close:{prin:'The argument about lead quality is always an argument about definitions.',cta:'Follow if you like thinking like this.'},
 reality:`A B2B company has a monthly marketing review and a monthly sales review. Marketing reports 180 leads generated. Sales reports 12 qualified conversations. Both numbers are correct. Neither team is lying. They are measuring against criteria they each defined independently — and never agreed on together.`,
 mistake:{head:'ASSUMING BOTH TEAMS MEAN THE SAME THING',body:`Marketing calls a form fill a lead. Sales calls a booked discovery call a lead. Nobody ever wrote down the difference. So marketing celebrates volume, sales complains about quality, and the pipeline stays broken.`},
 fix:{label:'HOW TO BUILD THE SLA',steps:['Interview Marketing Manager and 2 sales reps: document current lead flow, loss points, average response time — before writing a single word of the SLA','Define MQL: lead score ≥50, source = inbound, company email address. Define SQL: rep confirms BANT (Budget, Authority, Need, Timeline) within 48 hours of receiving MQL','Document SLA terms: Marketing commits to lead volume and quality. Sales commits to response within 4 business hours and BANT confirmation within 48 hours.','Add CRM custom fields: MQL Received Date and First Response Date. Build a weekly compliance report from these two fields.']},
 action:{head:'ONE CONVERSATION',body:`Book 30 minutes with your Sales Manager this week. Write down what an MQL means to marketing and what it means to sales. If they are different — that's your starting point. The SLA writes itself from that gap.`},
 caption:`Marketing says 200 leads. Sales says 3 were real. Neither is lying.

The conflict between marketing and sales is almost always a definitions problem. Both teams are measuring output against criteria the other team never agreed to. That's not a performance problem — it's a structural one.

Companies with a formal Sales & Marketing SLA see up to 36% higher lead-to-close rates. Most SMBs have never written one. The document forces the conversation both sides have been avoiding.

MQL/SQL isn't a CRM category. It's a business agreement.

#salesmarketing #gtm #leadqualification #b2bsales #revenueoperations #founderlessons #marketingstrategy`},

{day:5,defPal:'bk',pills:['AI ANALYSIS','CUSTOMER DATA'],
 cvScript:'50 reviews.',cvBebas:'3-MONTH STUDY.',cvTag:'Which would you choose?',subniche:'AI in Marketing · Strategy',
 setup:{label:'THE SITUATION',body:"Your customers have already told you what's wrong. The reviews exist. The problem is that founders read them one at a time, form opinions from outliers, and miss the patterns."},
 prob:{head:'ANECDOTES ARE NOT STRATEGY.',body:'One negative review is a data point. Ten with the same theme is a signal. Without pattern recognition at scale, you manage impressions — not reality.'},
 stat:{num:'90M',label:'MINUTES TO ANALYSE 50 REVIEWS WITH AI',ctx:"Batch 10 reviews through AI. Ask for sentiment, primary theme, and a key quote per review. Process all 50 in under 90 minutes. Same insight as a 3-month brand study."},
 shift:{head:'THE TOP 3 NEGATIVE THEMES ARE YOUR NEXT SPRINT.',body:"Not your next brand campaign. The review section is the cheapest market research you're ignoring. And your customers wrote it without being asked."},
 close:{prin:'Your customers already wrote the brief. You just haven\'t read it systematically.',cta:'Follow if you like thinking like this.'},
 reality:`A software company has 340 Google Play reviews. The founder reads them occasionally, notices the negative ones, and files a mental note. Nobody has ever grouped them by theme. Three of the top five complaints are about the same onboarding step — a step the product team has been debating removing for two years.`,
 mistake:{head:'READING REVIEWS AS STORIES NOT DATA',body:`One 1-star review is anecdote. Ten with the same language is a pattern. Without batch analysis across themes, you're making product and positioning decisions based on the loudest individual voice — not the actual distribution of what customers say.`},
 fix:{label:'THE 90-MINUTE PROCESS',steps:['Collect 50–100 public reviews into LibreOffice Calc: Review ID, Platform, Date, Star Rating, Review Text','Batch 10 reviews at a time into Claude or Gemini with this prompt: "For each review output JSON: {review_id, sentiment (positive/neutral/negative), primary_theme, key_quote (≤10 words)}"','Paste each output back into the spreadsheet. Extract sentiment, theme, and key quote into separate columns.','Build a frequency table: Theme × Sentiment count. Top 3 negative themes = your next product or positioning sprint.']},
 action:{head:'THIS WEEK',body:`Copy 50 reviews from Google Maps, G2, or Trustpilot into a spreadsheet. Run them through AI in batches of 10. Count the themes. The top negative theme will tell you more about your product roadmap than your last team meeting.`},
 caption:`50 reviews contain more insight than a 3-month brand study.

Your customers have already told you what's wrong. The reviews exist. The problem is that founders read them one at a time, form opinions from outliers, and miss the patterns that actually matter.

Batch 10 reviews through AI. Ask for sentiment, primary theme, and a key quote per review. Process all 50 in under 90 minutes. The top 3 negative themes are your next product sprint — not your next brand campaign.

The review section is the cheapest market research you're ignoring.

#customerinsights #aimarketing #productmarketing #voiceofcustomer #startupmarketing #marketingdata #businessgrowth`},

{day:6,defPal:'cr',pills:['COMPETITIVE INTEL','STRATEGY'],
 cvScript:'Your competitor',cvBebas:'MOVED LAST WEEK.',cvTag:'Did you know?',subniche:'Startup Blind Spots',
 setup:{label:'THE SITUATION',body:"Most founders do competitive research once a year. At strategy time. Then they forget. The market doesn't work on that schedule. Your competitors don't either."},
 prob:{head:'3 MONTHS LATE IS TOO LATE.',body:'Pricing changes, new features, job postings — each signals what\'s coming. By the time it appears in your feed, the competitor is three moves ahead of where your analysis left them.'},
 stat:{num:'25',label:'ALERTS TO SET UP A MONITORING SYSTEM',ctx:"5 competitors × 5 monitoring topics = 25 Google Alerts. One automated workflow aggregates them every Monday into a decision-ready brief. Setup time: under 3 hours."},
 shift:{head:'COMPETITIVE ADVANTAGE IS ABOUT SEEING MOVES EARLIER.',body:"Not having better ideas. The brief is automated. The decision still needs you. But you can't decide on intelligence you don't have."},
 close:{prin:'By the time it hits your timeline, it\'s already old news.',cta:'Follow if you like thinking like this.'},
 pullQuote:"I check what my competitors are doing maybe once a year — at strategy time. Then I forget.",
 reality:`A brand discovers at their annual strategy session that a competitor launched a lower-priced tier 4 months ago. They've been losing deals to this competitor all quarter. Three sales reps mentioned it in their loss notes. Nobody connected the dots because nobody was watching.`,
 mistake:{head:'DOING RESEARCH ONCE A YEAR',body:`Annual competitive reviews are comfort, not intelligence. By the time you update your battlecard in December, your competitor has already shipped three feature updates, hired into a new market, and repriced twice. You're responding to who they were, not who they are.`},
 fix:{label:'THE MONITORING SYSTEM',steps:['List 5 competitors and 5 monitoring topics each: pricing changes, product launches, funding/M&A, job postings (signals growth direction), new ad campaigns','Create Google Alerts (alerts.google.com) for each combination — up to 25 alerts. Frequency: once a week. Deliver to a dedicated Gmail inbox.','Install n8n locally (free, self-hosted). Build workflow: Gmail trigger every Monday → aggregate all alert emails → POST to Claude API with a prompt to produce a 400-word structured brief → Gmail send to team.','Week 2: review brief quality, refine the AI prompt. By week 4, the system runs without your involvement.']},
 action:{head:'START TODAY',body:`Create 5 Google Alerts for your top competitor — one for their brand name, one for their product, one for "[competitor] pricing", one for "[competitor] launch", one for "[competitor] jobs". That's a monitoring system in 10 minutes.`},
 caption:`Your competitor launched something last week. Did you know?

Most founders do competitive research once a year — at strategy time — then forget. Pricing changes, new feature launches, hiring signals — these are moves you should be seeing in real time, not months later.

25 Google Alerts + one automated workflow = a competitive intelligence brief in your inbox every Monday. Setup time: under 3 hours. Running cost: zero.

Competitive advantage isn't about better ideas. It's about seeing moves earlier.

#competitiveintelligence #marketingstrategy #startupstrategy #businessgrowth #founderlessons #gtm #marketingops`},

{day:7,defPal:'bk',pills:['CONTENT REPURPOSING','WORKFLOW'],
 cvScript:'One article.',cvBebas:'ONE POST.',cvTag:'That math is wrong.',subniche:'Strategy vs. Activity',
 setup:{label:'THE SITUATION',body:"One long-form piece contains a LinkedIn article, a carousel outline, an email section, a video script, and a tweet thread. Most brands extract exactly zero of those."},
 prob:{head:'IT\'S NOT A CONTENT VOLUME PROBLEM.',body:"It's a workflow problem. The asset already exists. The distribution system doesn't. So the same ideas get rewritten from scratch every month at full production cost."},
 stat:{num:'5×',label:'CONTENT OUTPUT FROM ONE SOURCE PIECE',ctx:"One 1,500-word blog post → 5 derivative pieces in under 3 hours with a structured AI repurposing workflow. Same insight. Five distribution channels. One system."},
 shift:{head:'CONTENT STRATEGY ISN\'T ABOUT WRITING MORE.',body:"It's about using what you already wrote. Build the repurposing SOP once. Run it every time you publish. The leverage compounds with every new piece."},
 close:{prin:'The asset exists. The workflow is what\'s missing.',cta:'Follow if you like thinking like this.'},
 reality:`A B2B consultant publishes one detailed blog post per week. Each takes 4 hours to research and write. The post gets shared once on LinkedIn, pulls modest traffic, and is forgotten by Thursday. The same insight — reformatted — could have reached three different audiences on three different platforms that week.`,
 mistake:{head:'TREATING EVERY FORMAT AS A SEPARATE BRIEF',body:`Each derivative piece gets briefed, written, and produced from scratch. A LinkedIn post is not a blog post with a character limit. It's the same insight, reframed for a different context. The reframing takes 20 minutes with a structured prompt — not 4 hours.`},
 fix:{label:'THE REPURPOSING WORKFLOW',steps:['Select a published blog post (≥1,500 words) as source. Define 5 output formats: LinkedIn article (~600 words), Twitter/X thread (8 tweets), email section (200 words), carousel outline (5–7 slides), 60-second video script.','Write a separate AI prompt for each format. LinkedIn example: "Rewrite as a LinkedIn article. Conversational, use subheadings, end with a thought-provoking question. 500–700 words."','Run all 5 prompts. Paste each output into separate tabs. Edit for brand voice — verify accuracy, add company-specific examples, confirm all claims.','Document this as a Content Repurposing SOP: source requirements, 5 prompt templates, editing checklist, distribution channel per format. Any team member should be able to run it.']},
 action:{head:'THIS WEEK',body:`Take one published post from the last 3 months. Run it through the 5 prompts above. Time yourself. If it takes under 3 hours start to finish — including editing — you have a repeatable system. Build the SOP from that session.`},
 caption:`You wrote one article. You got one post out of it.

One long-form piece already contains a LinkedIn article, a carousel outline, an email section, a video script, and a tweet thread. Most brands extract exactly zero of those. Not because they don't know — because the workflow doesn't exist.

One 1,500-word blog post → 5 derivative pieces in under 3 hours with a structured AI repurposing system. Same insight. Five distribution channels.

Content strategy isn't about writing more. It's about using what you already wrote.

#contentmarketing #contentstrategy #contentrepurposing #aimarketing #digitalmarketing #foundermarketing #marketingtips`},

{day:8,defPal:'cr',pills:['PIPELINE COVERAGE','SALES NUMBERS'],
 cvScript:'Rs. 8M pipeline.',cvBebas:'Rs. 10M QUOTA.',cvTag:"You're not fine.",subniche:'Numbers Marketing Ignores',
 setup:{label:'THE SITUATION',body:"Sales managers look at total pipeline and feel covered. But raw total is not the number that matters. It's what that total looks like against remaining quota — and how many of those deals are real."},
 prob:{head:'PIPELINE COVERAGE RATIO IS WHAT YOU\'RE MISSING.',body:'Open pipeline ÷ remaining quota. At 0.8× you\'re already underpowered. Most teams discover this at month-end, when it\'s too late to build.'},
 stat:{num:'3×',label:'MINIMUM PIPELINE COVERAGE RATIO',ctx:"Industry standard: 3–4× coverage. Below 3×: new deals need to be created, not just closed. Above 4×: the forecast is probably padded. Both are problems."},
 shift:{head:'PIPELINE COVERAGE IS A LEADING INDICATOR.',body:"Closed deals are a lagging one. Track the one that's early. The dashboard showing last month's wins is telling you about last quarter's decisions."},
 close:{prin:'The number that matters most is the one you can still change.',cta:'Follow if you like thinking like this.'},
 reality:`A sales team enters Q3 with Rs. 28M in open pipeline against a Rs. 12M quarterly quota. The manager feels comfortable. Coverage looks like 2.3×. But Rs. 10M of that pipeline hasn't had a touch in over 90 days, Rs. 6M has a close date that's already passed, and Rs. 4M is stuck in a stage it's been in for 45 days. Real active coverage: under 1×.`,
 mistake:{head:'COUNTING TOTAL PIPELINE AS REAL PIPELINE',body:`Stale deals, overdue close dates, and orphaned opportunities all inflate the number. A pipeline report without health filtering is not a forecast — it's a list. And lists don't tell you whether you'll hit your number.`},
 fix:{label:'HOW TO CALCULATE REAL COVERAGE',steps:['Export SuiteCRM open pipeline: Deal Name, Amount, Stage, Expected Close Date, Assigned Rep, Last Modified Date','In LibreOffice Calc add: Days Since Last Activity = =TODAY()−Last_Modified. Flag >90 days as Stale. Flag overdue open deals as Past Due.','Remove stale and overdue deals from your coverage calculation. Real Coverage = Healthy Open Pipeline ÷ Remaining Quota.','Build a stage conversion rate table to estimate what percentage of current-stage deals typically close. Weight your forecast by stage probability.']},
 action:{head:'THIS WEEK',body:`Pull your open pipeline right now. Filter for deals with no activity in 90+ days. Mark them stale. Recalculate your coverage ratio without them. If it drops below 3×, you have a pipeline problem — not a closing problem.`},
 caption:`Your quota is Rs. 10M. Your pipeline is Rs. 8M. You're not fine.

Sales managers look at total pipeline and feel covered. But raw total isn't the number that matters. Pipeline coverage = open pipeline ÷ remaining quota. At 0.8× you're already underpowered — and most teams discover this at month-end when it's too late to build.

Industry target is 3–4× coverage. Below 3×: you need new deals, not just closes. Above 4×: the forecast is padded.

Pipeline coverage is a leading indicator. Closed deals are a lagging one. Track the one that's early.

#salespipeline #salesmanagement #revenueoperations #b2bsales #salesstrategy #businessnumbers #founderlessons`},

{day:9,defPal:'bk',pills:['EMAIL PERSONALISATION','SEGMENTATION'],
 cvScript:'Everyone got',cvBebas:'THE SAME EMAIL.',cvTag:"That's why the rate is 12%.",subniche:'Why Marketing Fails',
 setup:{label:'THE SITUATION',body:"A SaaS buyer and a retail buyer have different problems. The same email addresses neither of them well. Generic content is efficient to produce and expensive in the attention it fails to earn."},
 prob:{head:'GENERIC EMAILS ARE A SEGMENTATION FAILURE.',body:"Not a design failure. Not a copy failure. The message was wrong before it was written because the audience wasn't defined. One brief, three different people."},
 stat:{num:'35%',label:'HIGHER OPEN RATES WITH SEGMENTED COPY',ctx:"3 industry segments. 3 AI-written variants. Same send time. Open rates 20–35% higher per segment vs. generic baseline. One prompt per segment. Three emails."},
 shift:{head:'PERSONALISATION AT SCALE IS NO LONGER AN ENTERPRISE FEATURE.',body:"It's a CRM field and a prompt. The segment you're ignoring is the one your competitor is writing to directly."},
 close:{prin:"You can't write a good email to everyone. You can write a great one to someone.",cta:'Follow if you like thinking like this.'},
 pullQuote:"We sent the same email to 4,000 contacts and got 11 replies. The content was fine. The audience wasn't.",
 reality:`An agency sends a monthly newsletter to a list of 4,200 contacts — designers, startup founders, and enterprise procurement managers all in the same send. The email references product integrations. Designers don't care. Procurement managers want compliance documentation. Founders want ROI data. All three groups received messaging optimised for none of them.`,
 mistake:{head:'TREATING ALL CONTACTS AS ONE AUDIENCE',body:`Segmentation isn't just a nice-to-have for large lists. It's the difference between an email that earns a response and one that trains your audience to ignore you. Every unsegmented send is a small withdrawal from your sender reputation.`},
 fix:{label:'3-SEGMENT PERSONALISATION SYSTEM',steps:['In your CRM, identify 3 industry or role-based segments using an existing custom field. If the field doesn\'t exist — create it and populate it from company name or signup source.','Open Claude or Gemini. Prompt: "Write 3 versions of a [product] email. Version 1 for [Segment A] focusing on [pain], Version 2 for [Segment B] focusing on [pain], Version 3 for [Segment C] focusing on [pain]. 150–200 words each, same subject line structure, same CTA." Output as JSON.','Review and edit each version for brand voice accuracy. Create 3 email templates in Mautic.','Build campaign with Decision nodes: Is contact in Segment A? → Send Email A. Else Segment B? → Send Email B. Else → Send Email C. Send internal test to 3 addresses to verify routing.']},
 action:{head:'NEXT SEND',body:`Before you write your next email, answer: who exactly is on this list, and what does each group actually care about? If the answer is "a mix of different people" — that's your cue to split the send before you write a single word.`},
 caption:`Everyone got the same email. That's why the open rate is 12%.

A SaaS buyer and a retail buyer have different problems. The same email addresses neither of them well. Generic content is efficient to produce and expensive in the attention it fails to earn.

3 industry segments. 3 AI-written variants. Same send time. Open rates 20–35% higher per segment vs. generic baseline. One prompt per segment. Three emails. No extra budget.

Personalisation at scale is no longer an enterprise feature. It's a CRM field and a prompt.

#emailmarketing #marketingpersonalisation #aimarketing #emailstrategy #b2bmarketing #marketingautomation #foundermarketing`},

{day:10,defPal:'cr',pills:['CONTENT STRATEGY','6-MONTH PLANNING'],
 cvScript:'A calendar is',cvBebas:'NOT STRATEGY.',cvTag:'',subniche:'Strategy vs. Activity',
 setup:{label:'THE SITUATION',body:"Most brands have a calendar. Few have pillars, keyword clusters, KPIs per pillar, and a governance process. The calendar is the output. Those four things are the inputs."},
 prob:{head:'WITHOUT A PILLAR STRUCTURE, YOU\'RE PUBLISHING, NOT BUILDING.',body:'Authority is built through consistency in a defined space. A random assortment of topics, posted on schedule, is noise with a calendar. Not content marketing.'},
 stat:{num:'52',label:'TOPICS IN A STRUCTURED 6-MONTH PLAN',ctx:"3–4 content pillars. Topic clusters per pillar. 52-topic editorial calendar. KPIs per pillar. Each piece earns its place before it's written. Not after it's published."},
 shift:{head:'THE DIFFERENCE IS INTENT VS. URGENCY.',body:"Publishing without a cluster map is just noise. The brands that dominate a niche build topic authority, not just publishing frequency. The calendar is the last thing you build."},
 close:{prin:'The calendar tells you what to post. The strategy tells you why it matters.',cta:'Follow if you like thinking like this.'},
 reality:`A brand has been publishing 3 blog posts a week for 18 months. They have 230 published posts. Organic traffic is flat. When they audit with Google Search Console, they find: 80% of posts have under 10 organic clicks per month, 40 posts compete for the same 6 keywords, and their top 3 traffic-driving posts are from 14 months ago — nothing since has come close.`,
 mistake:{head:'PUBLISHING FREQUENCY WITHOUT CLUSTER LOGIC',body:`Volume without architecture is noise. Writing about 12 different topics across 230 posts builds authority in nothing. Google rewards depth and topical coherence — a cluster of 8 articles around one core keyword outranks a catalogue of unrelated posts every time.`},
 fix:{label:'HOW TO BUILD A 6-MONTH STRATEGY',steps:['Export Google Search Console data (all pages, last 6 months). Identify your top 10 traffic-driving posts. These are your proof of concept — build clusters around the same topic families.','Define 3–4 content pillars from business objectives and audience pain points. Each pillar needs 1 cornerstone piece (2,000+ words) + 5–8 supporting articles built around near-miss keywords.','Build a 52-topic editorial calendar: Publish Date, Pillar, Topic/Title, Target Keyword, Format, Writer, Status, Organic Traffic Target. 2 posts per week = 52 topics in 6 months.','Define KPIs per pillar: organic traffic target, average time on page, backlink acquisition goal, lead gen attribution. Without pillar-level KPIs, you measure publishing rate — not business impact.']},
 action:{head:'AUDIT FIRST',body:`Before writing another post — export your last 90 days of GSC data. Find your top 10 pages by clicks. That's your first pillar. Every new article for the next 4 weeks should support one of those top 10 topics. That's a cluster.`},
 caption:`A content calendar is not a content strategy.

Most brands have a calendar. Few have content pillars, keyword clusters, KPIs per pillar, and a governance process. The calendar is the output. The strategy is what makes the output matter.

Without a pillar structure, you're publishing — not building authority. A 6-month content strategy: 3–4 pillars, topic clusters per pillar, 52-topic editorial calendar, KPIs tied to business objectives. Each piece earns its place before it's written.

Publishing without intent is just noise with a schedule.

#contentstrategy #contentmarketing #seostrategy #digitalmarketing #contentplanning #foundermarketing #marketingstrategy`},

{day:11,defPal:'bk',pills:['SEO','PRODUCT PAGES'],
 cvScript:'Traffic potential',cvBebas:"YOU'VE NEVER TOUCHED.",cvTag:'',subniche:'Startup Blind Spots · 4Ps',
 setup:{label:'THE SITUATION',body:"Most e-commerce brands write product descriptions for the customer. That's correct. But Google reads them first. And if Google doesn't rank the page, the customer never finds it."},
 prob:{head:'A DESCRIPTION WITHOUT SEO STRUCTURE IS INVISIBLE.',body:'No primary keyword in the opening line. No secondary terms woven through. No benefit-led structure. The page exists. The traffic doesn\'t arrive.'},
 stat:{num:'50',label:'PRODUCT DESCRIPTIONS IN ONE AI WORKFLOW',ctx:"50 AI-generated, SEO-optimised descriptions — reviewed, edited, bulk-uploaded. 30-day GSC check: impressions rising per product URL without a single additional paid click."},
 shift:{head:'PRODUCT PAGES ARE SEARCH REAL ESTATE.',body:"Not just sales assets. If your pages don't rank, your paid ads are carrying a job your content should be doing for free. Build both."},
 close:{prin:"The traffic your competitors earn on organic — your pages could earn that.",cta:'Follow if you like thinking like this.'},
 reality:`An e-commerce brand with 400 product SKUs has spent Rs. 3,00,000 on paid ads this quarter. Organic traffic to product pages: near zero. GSC shows 0 impressions for 310 of their products. Their descriptions are copy-pasted from the manufacturer spec sheet — no primary keyword, no benefit opening, no secondary terms. The paid ads are funding a job organic should be doing.`,
 mistake:{head:'WRITING DESCRIPTIONS FOR HUMANS ONLY',body:`The customer reads it after Google ranks it. Google ranks it based on structure, keyword relevance, and semantic depth — none of which a spec sheet copy-paste provides. A description that works for both needs a benefit-led opening line, a primary keyword in the first 25 words, and secondary terms placed naturally.`},
 fix:{label:'BULK DESCRIPTION SYSTEM',steps:['Build a product input template in LibreOffice Calc: Product ID, Name, Category, Key Features (3–5), Target Customer, Key Benefit, Primary Keyword, Secondary Keywords (2–3), Length (short/standard/long).','Write master AI prompt: "Write a product description for [product]. Requirements: [length] words, benefit-led opening sentence, primary keyword [keyword] in first 25 words, 2–3 secondary keywords placed naturally, subtle CTA at end."','Process in batches of 10. QC-check all outputs for hallucinated features, off-brand tone, keyword stuffing. Flag ~10–20% for manual editing.','Export approved descriptions as CSV. Import to WooCommerce via bulk product importer (free). After 30 days: GSC check on product page impressions vs. pre-upload baseline.']},
 action:{head:'START WITH 10',body:`Pick your 10 best-selling products. Write a proper description for each using the master prompt above. Upload. Check GSC impressions in 30 days. If they move — you have your business case for doing all 400.`},
 caption:`Your product pages have traffic potential you've never touched.

Most e-commerce brands write product descriptions for the customer. That's correct. But Google reads them first. A description without a primary keyword, benefit-led opening, and secondary terms woven through is invisible to search — no matter how good the product is.

50 AI-generated, SEO-optimised product descriptions. Reviewed, edited, bulk-uploaded. 30-day GSC check: impressions rising per product URL without a single additional paid click.

If your pages don't rank, your paid ads are carrying a job your content should be doing for free.

#ecommerce #seo #productmarketing #ecommercemarketing #seotips #digitalmarketing #businessgrowth`},

{day:12,defPal:'cr',pills:['CHURN PREDICTION','CAC / LTV'],
 cvScript:"They didn't",cvBebas:'LEAVE SUDDENLY.',cvTag:"You just weren't watching.",subniche:'Numbers Marketing Ignores · CAC/LTV',
 setup:{label:'THE SITUATION',body:"Churn doesn't happen on cancellation day. It happens 60 days earlier — in the behaviour that precedes it. No login. Rising tickets. Low NPS. The signals exist. Most companies never look."},
 prob:{head:'FIVE VARIABLES MOST TEAMS IGNORE.',body:'No login in 60 days. Support tickets above threshold. NPS below 5. Low contract value. High-churn industry. Each is a risk point. Invisible without a model.'},
 stat:{num:'10',label:'MAX CHURN RISK SCORE PER ACCOUNT',ctx:"5 variables scored per account. 0–10 risk score. Top 25% flagged for CS intervention. A simple scoring model in a spreadsheet — no machine learning required. Just pattern recognition."},
 shift:{head:'CHURN PREDICTION ISN\'T MACHINE LEARNING.',body:"It's pattern recognition you can do with a CSV export and two hours of setup. The account you lose next month already has a score. You just haven't built the model."},
 close:{prin:"The most expensive customer to replace is the one you could have kept.",cta:'Follow if you like thinking like this.'},
 pullQuote:"We had no idea they were unhappy. They just cancelled one day. No warning. No complaint. Nothing.",
 reality:`A SaaS company's customer success manager reviews the month's churned accounts. Account #1: last login was 74 days before cancellation. Account #2: 7 support tickets in the final 60 days. Account #3: NPS score of 4 submitted 3 months ago — no follow-up was ever scheduled. Every signal was there. Nobody was reading them.`,
 mistake:{head:'WAITING FOR THE CANCELLATION EMAIL',body:`Churn is treated as an event — the moment someone clicks cancel. In reality it's a process that started weeks or months earlier through small, visible behavioural shifts. Companies that wait for the event miss every opportunity to intervene during the process.`},
 fix:{label:'BUILD THE SCORING MODEL',steps:['Export from CRM: all accounts (active + churned) last 24 months — Account ID, Industry, Company Size, Contract Value, Support Tickets Count, Last Login Date, NPS Score, Status (Active/Churned).','Ask Claude: "Based on these patterns between churned and retained customers, identify the top 5 variables that differ most between the two groups. Suggest a simple 0–10 risk scoring formula."','Build the formula in LibreOffice Calc: assign risk points per variable triggered (no login >60d = +3, tickets >5 = +2, NPS ≤5 = +3, low-tier contract = +1, high-churn industry = +1).','Sort active accounts by Total Risk Score. Top 25% = High Risk (red). Email the list to your CS Manager with 3 recommended intervention actions per risk level.']},
 action:{head:'THIS WEEK',body:`Export your active accounts. Add one column: Days Since Last Login. Sort descending. Any account over 60 days with an active subscription — send a personal email from the account owner today. Not a template. A real email.`},
 caption:`They didn't leave suddenly. You just weren't watching.

Churn doesn't happen on cancellation day. It happens 60 days earlier — in behaviour patterns most companies never track. No login in 60 days. Support tickets above threshold. NPS below 5. Each is a risk point. Invisible without a model.

5 variables scored per account. 0–10 risk score. Top 25% flagged for CS intervention before they cancel. A simple scoring model you can build in a spreadsheet — no machine learning required.

The account you lose next month already has a score. You just haven't built the model yet.

#churnreduction #customerretention #saasmarketing #cltv #customersuccess #businessgrowth #founderlessons`},

{day:13,defPal:'bk',pills:['QBR','PIPELINE REVIEW'],
 cvScript:'22 slides.',cvBebas:'19 ARE NOISE.',cvTag:'',subniche:'Consulting Lessons · Agency Reality',
 setup:{label:'THE SITUATION',body:"Most QBR decks open with last quarter's wins. That's the least useful thing in the room. Everyone already knows the result. The question is what to do about the deals at risk right now."},
 prob:{head:'A QBR WITHOUT AN AT-RISK LIST IS A RETROSPECTIVE.',body:"Without deal health scoring, the QBR is a performance review. Not a decision session. The decisions need to happen before the quarter ends, not after."},
 stat:{num:'6',label:'DEAL HEALTH CRITERIA',ctx:"Last activity date, close date alignment, decision maker engaged, competitor mentioned, proposal sent, next step defined. Score 0–6. Below 2 = At Risk. Above 4 = Healthy."},
 shift:{head:'THE QBR SHOULD ANSWER ONE QUESTION.',body:"What are we doing about the 10 deals most likely to slip? Every slide before that answer is context. Every slide after it should be an intervention plan."},
 close:{prin:'A review without an intervention plan is just a record of what happened.',cta:'Follow if you like thinking like this.'},
 reality:`A sales director runs a 90-minute QBR with their team every quarter. Slide 1: revenue achieved. Slides 2–8: win highlights. Slide 9: pipeline overview. Slide 10: targets for next quarter. The top 10 at-risk deals — the ones that will determine whether the team hits quota — are never discussed. Because nobody scored them.`,
 mistake:{head:'REVIEWING WINS WHEN YOU SHOULD BE REVIEWING RISK',body:`A QBR structured around last quarter's wins is backward-looking. Every minute spent celebrating closed deals is a minute not spent on the deals that are about to slip. The QBR's only useful function is deciding what to do about the deals still in play.`},
 fix:{label:'THE DEAL HEALTH SCORECARD',steps:['Export full open pipeline: Deal Name, Account, Rep, Stage, Amount, Close Date, Last Activity Date, Next Step.','Score each deal on 6 criteria (0 or 1 each): Last activity >14 days ago, Close date <30 days, Stage matches timeline, Decision maker engaged, Competitor mentioned, Proposal sent. Total: 0–2 = At Risk, 3–4 = Uncertain, 5–6 = Healthy.','Apply health multiplier to weighted forecast: At Risk ×0.5, Uncertain ×0.75, Healthy ×1.0. Sum for your real EoQ forecast.','Identify top 10 at-risk deals by (Amount × Base Probability) where health score ≤2. Assign one intervention action per deal before the QBR ends.']},
 action:{head:'BEFORE YOUR NEXT QBR',body:`Run the 6-criteria scorecard on your top 20 open deals. Spend the first 45 minutes of your next QBR on the bottom 10 by health score — not the top 10 by size. The decisions that happen in that conversation will determine the quarter.`},
 caption:`Your QBR deck has 22 slides. 19 of them are noise.

Most QBR decks open with last quarter's wins — the least useful thing in the room. Everyone already knows the result. The QBR should answer one question: what are we doing about the deals most likely to slip?

A 6-criteria deal health scorecard takes 20 minutes to run. Last activity date, close date alignment, decision maker engaged, competitor mentioned, proposal sent, next step defined. Below 2 out of 6 = at risk. Flag it before the quarter ends.

A QBR without an intervention plan is just a retrospective with slides.

#salesleadership #qbr #pipelinemanagement #b2bsales #salesstrategy #revenueoperations #businessgrowth`},

{day:14,defPal:'cr',pills:['MARKETING ROI','BUDGET MODEL'],
 cvScript:"What's the ROI?",cvBebas:'IT DEPENDS.',cvTag:'Wrong answer.',subniche:'Numbers Marketing Ignores · Consulting Lessons',
 setup:{label:'THE SITUATION',body:"Most marketing budgets are built on last year's spend. Not this year's outcomes. The question a board asks isn't 'what did you spend?' It's 'what did we get — and what will we get next year?'"},
 prob:{head:'NO SCENARIO MODEL. NO CREDIBILITY IN THE ROOM.',body:"A flat budget allocation with no ROI projection is a request for trust. Not a business case. The board approved it once. This time they want the math."},
 stat:{num:'3',label:'SCENARIOS IN EVERY MARKETING BUDGET',ctx:"Bear (−20% budget), Base, Bull (+20%). ROI formula per channel: (Revenue − Spend) ÷ Spend. Any channel under 1.0× gets questioned before the year starts — not after."},
 shift:{head:'A BUDGET\'S PURPOSE IS TO FLAG WHAT ISN\'T WORKING BEFORE YOU SPEND IT.',body:"Not to allocate evenly. Not to look like last year. The 3-scenario model makes the conversation honest before the money moves."},
 close:{prin:"If you can't model three outcomes, you're not managing a budget. You're hoping.",cta:'Follow if you like thinking like this.'},
 reality:`A marketing team submits an Rs. 85,00,000 annual budget. Line items: paid social, agency fees, events, tools. ROI column: blank. When the CFO asks what the business gets back from the Rs. 22,00,000 agency retainer, the answer is "brand awareness and content output." The budget is approved. The retainer is renewed. Nobody runs the number.`,
 mistake:{head:'PRESENTING SPEND WITHOUT ROI MODELLING',body:`A budget without projected return is a wish list. It tells leadership what you plan to spend but nothing about what the business should expect in return. And when cuts come — as they always do — the channels with no ROI justification go first, regardless of whether they're actually working.`},
 fix:{label:'HOW TO BUILD THE 3-SCENARIO MODEL',steps:['LibreOffice Calc "Budget Allocation" tab: rows = channels, columns = Allocated Budget, Est. Leads, Est. CPL, Est. Conversion to Customer, Est. Revenue Contribution.','Build 3 scenarios using input cell multipliers: Bear = Base Budget × 0.8, Base = current plan, Bull = Base Budget × 1.2. Each scenario recalculates all downstream estimates automatically.','ROI formula per channel: = (Revenue Contribution − Channel Spend) ÷ Channel Spend. Highlight any channel under 1.0× in red. This becomes your renegotiation or reallocation agenda.','LibreOffice Impress: 8-slide board deck — Cover, Objectives, Budget Summary, Channel Allocation (pie chart), ROI by Channel, 3 Scenarios, Risks & Assumptions, Recommended Approval.']},
 action:{head:'THIS MONTH',body:`Add one column to your current budget spreadsheet: "Estimated Revenue Contribution." Make your best estimate for each channel based on historical conversion rates. The channels where you can't even estimate a number — those are the ones that need justification first.`},
 caption:`Your board asked "what's the ROI?" You said "it depends." Wrong answer.

Most marketing budgets are built on last year's spend — not this year's outcomes. A flat allocation with no ROI projection isn't a business case. It's a request for trust.

3-scenario model: Bear (−20% budget), Base, Bull (+20%). ROI formula per channel: (Revenue − Spend) ÷ Spend. Any channel under 1.0× gets questioned before the year starts — not after it ends. That's what makes the conversation credible.

The purpose of a budget isn't allocation. It's discipline.

#marketingbudget #marketingroi #businessstrategy #foundermarketing #marketingplanning #b2bmarketing #businessgrowth`},

{day:17,defPal:'bk',pills:['PRICING STRATEGY','POSITIONING'],
 cvScript:'Cost + margin.',cvBebas:'THEIR PRICE.',cvTag:'Different conversations.',subniche:'GTM · Pricing',
 setup:{label:'THE SITUATION',body:"Cost-plus pricing is the default. You add margin to cost, set a price, and call it done. It's logical. It's transparent. It's also the floor of what you could be charging."},
 prob:{head:'YOUR MARGIN IS FIXED. THEIR POSITIONING ISN\'T.',body:"When a competitor prices on value, they're not just capturing more money. They're creating a buyer perception that makes your cost-plus price look like a discount — or worse, a commodity."},
 stat:{num:'Rs.2L',label:'THE VALUE FRAMING THAT CHANGES THE CONVERSATION',ctx:"Value-based pricing starts with the outcome: 'This saves you Rs. 2,00,000 per year.' Price at Rs. 30,000 against that context — the conversation changes entirely."},
 shift:{head:'THE GAP BETWEEN WHAT YOU CHARGE AND WHAT IT\'S WORTH IS A POSITIONING GAP.',body:"Not a product gap. The product can be identical. The frame determines the price the market accepts. Build the frame first."},
 close:{prin:"Price is the story you tell about value before they try it.",cta:'Follow if you like thinking like this.'},
 caption:`You priced it at cost + margin. Your competitor priced it at willingness to pay.

Cost-plus pricing is the default. It's logical, transparent, and also the floor of what you could be charging. When a competitor prices on value, they're not just capturing more money — they're building a buyer perception that makes your number look like a commodity.

Value-based pricing starts with one question: what outcome does this deliver? Rs. 30,000 is a number. "This saves you Rs. 2,00,000 per year" is a pricing conversation. The product can be identical. The frame determines the price the market accepts.

The gap between what you charge and what it's worth is a positioning gap — not a product gap.

#pricingstrategy #valuebasedpricing #productmarketing #founderlessons #businessstrategy #gtm #marketingstrategy`},

 cvScript:'10,000 free users.',cvBebas:'90 PAYING.',cvTag:'',subniche:'CAC/LTV · SaaS',
 setup:{label:'THE SITUATION',body:"Most SaaS founders treat low free-to-paid conversion as a product problem. Build more features. Improve onboarding. Add nudges. The product is usually fine. The architecture isn't."},
 prob:{head:'IF THE FREE TIER SOLVES THE PROBLEM, THERE\'S NO UPGRADE.',body:"The paywall is in the wrong place. Freemium only works when the free tier creates the habit and the paid tier creates the outcome. Most products give too much free."},

 cvScript:'80% of quota.',cvBebas:'THE REAL COST.',cvTag:'',subniche:'Numbers Marketing Ignores',

 stat:{num:'8–15%',label:'TARGET COMP-TO-REVENUE RATIO AT 100%',ctx:"Above 15%: the quota is underbuilt or the plan overpays. Below 8%: you're likely underpricing talent and losing people. Model it before you announce it."},
 shift:{head:'A COMPENSATION PLAN IS A FINANCIAL MODEL.',body:"If you haven't stress-tested it at 80%, 100%, and 120% attainment, you haven't finished it. The plan that motivates your best rep may also be the one that breaks margin."},

 pullQuote:"Our best rep hit 120% and we realised halfway through the quarter we hadn't budgeted for the accelerators.",
 caption:`Your rep hit 80% of quota. Here's what that actually costs you.

Most sales comp plans are modelled at 100% attainment. Clean, theoretical, boardroom-ready. Nobody asks what the cost looks like at 80% — or what happens to margin when someone hits 120% with accelerators, SPIFs, and new logo bonuses all firing at once.

{day:24,defPal:'cr',pills:['ABANDONED CART','E-COMMERCE'],
 cvScript:'70% of carts',cvBebas:'ABANDONED.',cvTag:'Most brands recover 5%.',subniche:'Retail/E-commerce · Numbers',
 setup:{label:'THE SITUATION',body:"The customer found the product, added it, and left. That is not a traffic problem. The intent was there. The recovery system wasn't built."},
 prob:{head:'ONE GENERIC EMAIL RECOVERS A FRACTION OF WHAT A SEQUENCE DOES.',body:"'You left something behind' — the most unread subject line in e-commerce. No urgency. No personalisation. No timeline. One email is not a recovery workflow."},
 stat:{num:'15%',label:'RECOVERY RATE WITH A 3-EMAIL SEQUENCE',ctx:"Immediate (within 1 hour), reminder at 24 hours, final offer at 72 hours. Sequenced flow recovery rate: 8–15%. Single generic email: under 5%. The difference is three sends."},

{day:29,defPal:'bk',pills:['ATTRIBUTION','CHANNEL CREDIT'],
 cvScript:'Paid social is',cvBebas:'TAKING CREDIT.',cvTag:'For sales email deserves.',subniche:'Numbers Marketing Ignores · 2026',
 setup:{label:'THE SITUATION',body:"Last-click attribution assigns 100% of conversion credit to the last touchpoint. In a multi-channel buyer journey, that's almost always wrong. And the budget decisions that follow it are wrong too."},
 prob:{head:'YOU CUT THE CHANNEL THAT STARTED THE JOURNEY.',body:"The one that wasn't last-click. The one that built intent, moved the buyer into consideration, and handed them off three weeks before the final conversion. You called it underperforming."},
 stat:{num:'6',label:'TOUCHPOINTS IN AN AVERAGE B2B BUYER JOURNEY',ctx:"LinkedIn post → search → blog → email → retargeting → close. Last-click credits retargeting. The blog that started intent gets zero credit. Your budget reflects that misjudgement."},
 shift:{head:'ATTRIBUTION IS ABOUT WHICH CHANNELS DESERVE MORE BUDGET.',body:"Not about credit. The channel you're about to cut is probably doing more than your model shows. Fix the model before you cut the channel."},
 close:{prin:"The model you use to measure is the model you use to decide. Get the model right first.",cta:'Follow if you like thinking like this.'},
 caption:`Paid social is taking credit for sales email deserves.

Last-click attribution assigns 100% of conversion credit to the final touchpoint. In a multi-channel buyer journey, that's almost always wrong — and the budget decisions that follow it are wrong too. You cut the channel that built intent and double down on the one that happened to be last.

A typical B2B journey: LinkedIn post → search → blog → email → retargeting → close. Last-click credits retargeting. The blog that started the whole journey gets zero. Your budget reflects that misjudgement every quarter.

#marketingattribution #digitalmarketing #marketinganalytics #b2bmarketing #marketingops #datadriven #foundermarketing`},

{day:10, type:'task', defPal:'bk', taskIds:[6], pills:['BUDGET TRACKER','MARKETING OPS'],
 cover:{hook:'Your budget was approved in January.',sub:'IT\'S APRIL. CHECK THE MATH.',tag:''},
 why:'Most marketing budgets are planned once and never tracked properly. A variance tracker with conditional formatting means overruns are visible the week they happen — not when invoices land at quarter-end.',
 stepsA:[{n:'01',head:'Set up the tracker structure',body:'LibreOffice Calc. Sheet 1 "Budget Tracker": Category · Channel · Planned Budget · Actual Spend · Variance (Rs.) · Variance (%) · Status. Rows: Paid Social, Search, Email, SEO/Content, Events, Tools, Agency Fees, Misc, TOTAL.'},
          {n:'02',head:'Build the formulas',body:'Column E (Variance Rs.) = Actual − Planned. Column F (Variance %) = IF(Planned>0,(Actual−Planned)/Planned,0). Column G (Status) = IF(F>0.1,"OVER",IF(F>0,"AT RISK","ON TRACK")). TOTAL row: SUM formulas.'},
          {n:'03',head:'Add conditional formatting',body:'Status = "OVER" → red fill. "AT RISK" → amber fill. "ON TRACK" → green fill. Protect formula cells (Format → Cells → Protection). This prevents accidental overwrites.'}],
 stepsB:[{n:'04',head:'Build Sheet 2: Monthly Summary',body:'Pull totals from Sheet 1. Create bar chart: Planned vs Actual spend by channel. Add budget utilisation % row: =Actual Total / Planned Total. Target: stay under 100%.'},
          {n:'05',head:'Update weekly',body:'Every Monday: enter actual spend from invoices/receipts. Any row turning amber gets a note. Any row turning red gets escalated that day — not at month-end.'},
          {n:'06',head:'Review the flag',body:'The channel that goes over repeatedly is the one to question — not the invoice, the strategy. The tracker is a decision tool, not just accounting. Save as .xlsx. Share with Finance monthly.'}],
 tools:'LibreOffice Calc (free) · Invoice/receipt data · Chart of accounts · Annual budget allocation',
 output:'XLSX tracker: variance formulas, colour-coded status per channel, bar chart. Total row showing budget utilisation %. Channels >10% over budget flagged red.',
 close:'A budget without a tracker is just a wish list.',
 caption:`Your budget was approved in January. It's April. Check the math.

A marketing budget tracker built in LibreOffice Calc — with planned vs actual, variance formulas, and conditional formatting — means overruns are visible the week they happen, not at quarter-end.

Formula: (Actual − Planned) ÷ Planned. Over 10% = flag red. AT RISK = amber. ON TRACK = green. Update every Monday. The channel turning red every month is the one to question — not the invoice, the strategy.

A budget without a tracker is just a wish list.

#marketingbudget #marketingops #budgetmanagement #libreoffice #marketingstrategy #businessgrowth #foundermarketing`},
