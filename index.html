<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>30 Carousels — @haseebwrites</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Playfair+Display:ital,wght@1,700;1,900&family=Poppins:wght@800;900&family=DM+Sans:wght@400;500;600&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0A0907;font-family:'DM Sans',sans-serif;min-height:100vh;}

/* ===== INDEX ===== */
#idx{padding:40px 32px 60px;}
.idx-hd{text-align:center;margin-bottom:40px;}
.idx-hd h1{font-family:'Bebas Neue',sans-serif;font-size:52px;letter-spacing:3px;color:#F2E8D5;}
.idx-hd p{font-family:'Space Mono',monospace;font-size:11px;color:#5A4E40;margin-top:6px;letter-spacing:.1em;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;max-width:1200px;margin:0 auto;}
.card{background:#0F0C08;border:1px solid rgba(242,232,213,.07);padding:20px;cursor:pointer;transition:all .18s;border-radius:2px;}
.card:hover{border-color:rgba(242,232,213,.25);background:#141108;transform:translateY(-2px);}
.card-day{font-family:'Space Mono',monospace;font-size:10px;color:#3D3020;margin-bottom:10px;letter-spacing:.1em;}
.card-hl{font-family:'Poppins',sans-serif;font-weight:900;font-size:12px;color:#F2E8D5;line-height:1.4;margin-bottom:10px;}
.card-sub{font-family:'DM Sans',sans-serif;font-size:11px;color:#5A4E40;line-height:1.4;}
.card-pal{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:5px;vertical-align:middle;}
.pal-b{background:#0A0907;border:1px solid #3D3020;}
.pal-c{background:#F2E8D5;}

/* ===== VIEWER ===== */
#vwr{display:none;flex-direction:column;align-items:center;padding:28px 20px 50px;min-height:100vh;}
.vwr-top{display:flex;align-items:center;gap:12px;margin-bottom:22px;width:540px;max-width:100%;}
.btn-back{font-family:'Space Mono',monospace;font-size:10px;color:#5A4E40;cursor:pointer;background:none;border:1px solid rgba(242,232,213,.1);padding:7px 14px;letter-spacing:.08em;transition:all .15s;}
.btn-back:hover{color:#F2E8D5;border-color:rgba(242,232,213,.3);}
.vwr-day{font-family:'Space Mono',monospace;font-size:10px;color:#3D3020;letter-spacing:.1em;}
.vwr-title{font-family:'Poppins',sans-serif;font-weight:800;font-size:12px;color:#C4B49A;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.pal-tog{display:flex;gap:6px;}
.ptbtn{font-family:'Space Mono',monospace;font-size:9px;padding:6px 12px;cursor:pointer;border:1px solid rgba(242,232,213,.12);background:none;color:#5A4E40;letter-spacing:.08em;transition:all .15s;}
.ptbtn:hover{color:#C4B49A;border-color:rgba(242,232,213,.25);}
.ptbtn.on{background:rgba(242,232,213,.08);color:#F2E8D5;border-color:rgba(242,232,213,.35);}

/* ===== SLIDE WRAPPER ===== */
.sw{position:relative;width:540px;height:540px;max-width:100%;}
@media(max-width:580px){.sw{width:calc(100vw - 40px);height:calc(100vw - 40px);}}

/* ===== SLIDE BASE ===== */
.slide{display:none;position:absolute;top:0;left:0;width:100%;height:100%;overflow:hidden;flex-direction:column;}
.slide.on{display:flex;}

/* CREAM */
.cr{background:#F2E8D5;}
.cr .tp{color:#0F0C08;}
.cr .ts{color:#3D3020;}
.cr .tm{color:#7A6A55;}
.cr .pill{background:rgba(15,12,8,.07);border:1.5px solid rgba(15,12,8,.18);color:#0F0C08;}
.cr .bgn{color:#0F0C08;opacity:.045;}
.cr .stripe{background:#0F0C08;opacity:.07;}
.cr .cmk{stroke:#0F0C08;stroke-opacity:.18;}
.cr .arc{stroke:#0F0C08;}
.cr .lbar{background:#0F0C08;opacity:.45;}
.cr .hline{background:rgba(15,12,8,.1);}

/* BLACK */
.bk{background:#0A0907;}
.bk .tp{color:#F2E8D5;}
.bk .ts{color:#C4B49A;}
.bk .tm{color:#5A4E40;}
.bk .pill{background:rgba(242,232,213,.08);border:1.5px solid rgba(242,232,213,.2);color:#F2E8D5;}
.bk .bgn{color:#F2E8D5;opacity:.04;}
.bk .stripe{background:#F2E8D5;opacity:.06;}
.bk .cmk{stroke:#F2E8D5;stroke-opacity:.16;}
.bk .arc{stroke:#F2E8D5;}
.bk .lbar{background:#F2E8D5;opacity:.4;}
.bk .hline{background:rgba(242,232,213,.08);}

/* COVER */
.s-cover{padding:28px 30px 30px;justify-content:space-between;}
.cv-top{text-align:center;}
.cv-handle{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.12em;opacity:.5;}
.cv-mid{flex:1;display:flex;flex-direction:column;justify-content:center;padding:10px 0;}
.cv-script{font-family:'Playfair Display',serif;font-style:italic;font-weight:900;line-height:.93;letter-spacing:-.02em;}
.cv-bebas{font-family:'Bebas Neue',sans-serif;line-height:.9;letter-spacing:.02em;}
.cv-bot{display:flex;justify-content:space-between;align-items:flex-end;min-height:32px;}
.cv-tag{font-family:'DM Sans',sans-serif;font-weight:500;font-size:12px;}
.pill{position:absolute;font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.08em;padding:5px 11px;border-radius:100px;pointer-events:none;z-index:6;white-space:nowrap;}

/* INTERIOR BASE */
.s-int{padding:44px;justify-content:center;}
.sn{position:absolute;top:18px;right:26px;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.1em;z-index:3;}
.bh{position:absolute;bottom:22px;left:32px;font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.1em;opacity:.45;z-index:3;}
.slabel{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.15em;text-transform:uppercase;opacity:.55;margin-bottom:14px;display:block;}

/* SETUP */
.setup-body{font-family:'DM Sans',sans-serif;font-size:17px;line-height:1.65;position:relative;z-index:2;}

/* PROBLEM */
.prob-head{font-family:'Bebas Neue',sans-serif;font-size:52px;line-height:.92;letter-spacing:.01em;position:relative;z-index:2;margin-bottom:14px;}
.prob-body{font-family:'DM Sans',sans-serif;font-size:15px;line-height:1.65;position:relative;z-index:2;}

/* STAT */
.s-stat{position:relative;}
.stat-bgn{position:absolute;font-family:'Bebas Neue',sans-serif;font-size:220px;line-height:1;right:-15px;bottom:-35px;pointer-events:none;z-index:1;}
.stat-label{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.15em;text-transform:uppercase;margin-bottom:10px;display:block;position:relative;z-index:2;opacity:.55;}
.stat-num{font-family:'Bebas Neue',sans-serif;font-size:100px;line-height:.88;position:relative;z-index:2;letter-spacing:.01em;}
.stat-ctx{font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.6;margin-top:18px;position:relative;z-index:2;}

/* SHIFT */
.shift-line{height:1px;width:48px;margin-bottom:18px;position:relative;z-index:2;}
.shift-head{font-family:'Bebas Neue',sans-serif;font-size:46px;line-height:.92;letter-spacing:.01em;position:relative;z-index:2;margin-bottom:16px;}
.shift-body{font-family:'DM Sans',sans-serif;font-size:15px;line-height:1.65;position:relative;z-index:2;}

/* CLOSE */
.s-close{position:relative;}
.close-prin{font-family:'Playfair Display',serif;font-style:italic;font-weight:700;font-size:24px;line-height:1.42;margin-bottom:24px;position:relative;z-index:2;}
.close-cta{font-family:'DM Sans',sans-serif;font-size:12px;letter-spacing:.05em;opacity:.5;position:relative;z-index:2;}

/* ===== CONTROLS ===== */
.ctrl{display:flex;align-items:center;justify-content:space-between;margin-top:18px;width:540px;max-width:100%;}
.cbtn{font-family:'Space Mono',monospace;font-size:10px;cursor:pointer;background:none;border:1px solid rgba(242,232,213,.12);padding:8px 18px;color:#5A4E40;letter-spacing:.08em;transition:all .15s;}
.cbtn:hover:not(:disabled){border-color:rgba(242,232,213,.3);color:#C4B49A;}
.cbtn:disabled{opacity:.2;cursor:default;}
.dots{display:flex;gap:7px;align-items:center;}
.dot{width:5px;height:5px;border-radius:50%;background:#2a2828;cursor:pointer;transition:all .15s;}
.dot.on{background:#C4B49A;width:18px;border-radius:3px;}

/* ===== CAROUSEL NAV STRIP ===== */
.cnav{display:flex;gap:10px;margin-top:20px;align-items:center;font-family:'Space Mono',monospace;font-size:10px;color:#3D3020;letter-spacing:.08em;}
.cnav-btn{cursor:pointer;border:1px solid rgba(242,232,213,.1);padding:6px 14px;background:none;color:#5A4E40;font-family:'Space Mono',monospace;font-size:10px;transition:all .15s;letter-spacing:.08em;}
.cnav-btn:hover{color:#C4B49A;border-color:rgba(242,232,213,.25);}
.cnav-btn:disabled{opacity:.2;cursor:default;}
/* ===== CAPTION PANEL ===== */
.cap-panel{width:540px;max-width:100%;margin-top:28px;background:#0F0C08;border:1px solid rgba(242,232,213,.08);padding:24px;}
.cap-label{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:#3D3020;margin-bottom:14px;display:block;}
.cap-text{font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.75;color:#C4B49A;white-space:pre-wrap;word-break:break-word;}
.cap-actions{display:flex;gap:8px;margin-top:16px;align-items:center;}
.cap-copy{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.1em;padding:8px 18px;background:none;border:1px solid rgba(242,232,213,.18);color:#C4B49A;cursor:pointer;transition:all .15s;text-transform:uppercase;}
.cap-copy:hover{border-color:#F2E8D5;color:#F2E8D5;}
.cap-copied{font-family:'Space Mono',monospace;font-size:9px;color:#5A4E40;letter-spacing:.08em;opacity:0;transition:opacity .3s;}
.cap-copied.show{opacity:1;}

/* ===== IMAGE TOOLBAR ===== */
.img-toolbar{width:540px;max-width:100%;display:flex;gap:8px;margin-top:10px;align-items:center;}
.img-btn{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.1em;padding:9px 18px;background:none;border:1px solid rgba(242,232,213,.15);color:#C4B49A;cursor:pointer;transition:all .15s;text-transform:uppercase;display:flex;align-items:center;gap:7px;white-space:nowrap;}
.img-btn:hover{border-color:#F2E8D5;color:#F2E8D5;}
.img-btn:disabled{opacity:.25;cursor:default;}
.img-btn svg{flex-shrink:0;}
.img-feedback{font-family:'Space Mono',monospace;font-size:9px;color:#5A4E40;letter-spacing:.08em;opacity:0;transition:opacity .3s;margin-left:4px;}
.img-feedback.show{opacity:1;}
.img-filename{font-family:'Space Mono',monospace;font-size:9px;color:#3D3020;letter-spacing:.06em;margin-left:auto;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:220px;}
</style>
</head>
<body>

<!-- INDEX -->
<div id="idx">
  <div class="idx-hd">
    <h1>30 CAROUSELS</h1>
    <p>@HASEEBCH49 · BUSINESS GROWTH THROUGH NUMBERS & POSITIONING</p>
  </div>
  <div class="grid" id="grid"></div>
</div>

<!-- VIEWER -->
<div id="vwr">
  <div class="vwr-top">
    <button class="btn-back" onclick="showIdx()">← ALL</button>
    <span class="vwr-day" id="vday"></span>
    <span class="vwr-title" id="vtitle"></span>

      <button class="ptbtn" id="pbk" onclick="setPal('bk')">BLACK</button>
      <button class="ptbtn" id="pcr" onclick="setPal('cr')">CREAM</button>
    </div>
  </div>
  <div class="sw" id="sw"></div>

    <button class="img-btn" id="btn-copy-img" onclick="copySlideImage()">

<script>
const H = '@haseebch49';
let curC = 0, curS = 0, curPal = null;

const DATA = [
{day:1,defPal:'bk',pills:['AI IN MARKETING','AD COPY'],
 cvScript:'Your ad',cvBebas:"DIDN'T FAIL.",cvTag:'Your copy did.',subniche:'AI in Marketing · Why Marketing Fails',
 setup:{label:'THE SITUATION',body:'Most founders write one ad copy version and run it for weeks. When it underperforms, the creative gets blamed. The budget gets pulled. The test never happened.'},
 prob:{head:'NO VARIANT. NO DATA. NO LEARNING.',body:"A single copy version is not a campaign. It's a guess. And guesses don't scale. You can't learn from one data point."},
 stat:{num:'2HRS',label:'AI GENERATION TIME',ctx:"AI can generate 10 copy variants in under 2 hours. Manual effort for the same output: 2 days minimum. Generate variants, score them, deploy top 2, run 72 hours."},
 shift:{head:'THE WINNING FORMULA IS THE FASTEST TEST.',body:"Generate variants. Score them against clarity, CTA strength, and emotional pull. Deploy top 2. Let the data tell you what your opinion can't."},
 close:{prin:'Test more. Guess less.',cta:'Follow if you like thinking like this.'},
 caption:`Your ad didn't fail. Your copy did.

Most founders write one version, run it for weeks, and blame the creative when the numbers don't move. The problem is upstream — no variant means no data, and no data means no learning.

AI can generate 10 copy variants in under 2 hours. Deploy the top 2. Run 72 hours. Let the result tell you what your opinion can't.

The winning formula isn't the best line. It's the fastest test.

#marketingstrategy #digitalmarketing #adcopy #foundermarketing #growthmindset #marketingtips #businessgrowth`},

{day:2,defPal:'cr',pills:['LEAD SCORING','GTM'],
 cvScript:"You're sending",cvBebas:'EVERY LEAD',cvTag:'to sales. That\'s the problem.',subniche:'Strategy vs. Activity',
 setup:{label:'THE SITUATION',body:"Your sales team treats a pricing page visit the same as a newsletter open. Both are contacts. Only one is ready to buy. And your reps are spending equal time on both."},
 prob:{head:'UNSCORED LEADS WASTE SALES CAPACITY.',body:"When everything looks urgent, nothing is prioritised. The buyer who's ready gets the same attention as the one who opened an email by accident."},
 stat:{num:'50',label:'SCORE THRESHOLD',ctx:"Email opened = +5 pts. Pricing page = +15. Form filled = +25. Alert fires at 50. Below that — marketing's problem to nurture, not sales' problem to chase."},
 shift:{head:'SALES SHOULD ONLY SEE LEADS ABOVE THRESHOLD.',body:"Everything else is marketing's job. Lead scoring isn't a CRM feature. It's a capacity decision that determines how your team spends its day."},
 close:{prin:'The lead worth calling already told you.',cta:'Follow if you like thinking like this.'},
 caption:`You're sending every lead to sales. That's the problem.

A pricing page visit and a newsletter open are not the same signal. When your sales team treats them equally, capacity gets wasted on the wrong people — and the buyers who are ready get lost in the queue.

Simple scoring model: email opened = +5 pts, pricing page = +15, form filled = +25. Alert fires at 50. Below that, it's marketing's job to nurture — not sales' job to chase.

Lead scoring isn't a CRM feature. It's a capacity decision.

#salesstrategy #leadgeneration #b2bmarketing #marketingautomation #founderlessons #gtm #businessgrowth`},

{day:3,defPal:'bk',pills:['BUDGET MANAGEMENT','NUMBERS'],
 cvScript:'Budget exists.',cvBebas:"TRACKER DOESN'T.",cvTag:'',subniche:'Numbers Marketing Ignores',
 setup:{label:'THE SITUATION',body:"Most marketing budgets live in a PDF or a verbal agreement. Planned spend is an estimate. Actual spend is a surprise. Nobody compares the two until it's month-end."},
 prob:{head:'YOU ONLY KNOW YOU\'RE OVER BUDGET WHEN IT\'S TOO LATE.',body:'Overruns compound. A 10% overspend in paid social funds an agency fee that funds an event. By quarter-end, the math is broken and the explanations are creative.'},
 stat:{num:'10%',label:'OVERRUN FLAG THRESHOLD',ctx:"Variance formula: (Actual − Planned) ÷ Planned. Anything over 10% gets flagged. Rs. 50,000 in untracked overruns is a strategy problem, not an accounting one."},
 shift:{head:'THE CHANNEL GOING OVER IS THE ONE YOU HAVEN\'T QUESTIONED.',body:"Budget tracking isn't accounting. It's a weekly decision tool. The red flag tells you where to look, before the spend becomes a post-mortem."},
 close:{prin:'Variance is the conversation you avoid until it becomes unavoidable.',cta:'Follow if you like thinking like this.'},
 caption:`You have a marketing budget. You don't have a marketing tracker.

Most budgets live in a PDF or a verbal agreement. Planned spend is an estimate. Actual spend is a surprise. And by the time someone notices the overrun, the quarter is already broken.

Variance formula: (Actual − Planned) ÷ Planned. Anything over 10% gets flagged. Rs. 50,000 in untracked overruns is a strategy problem, not an accounting one.

The channel that keeps going over is the channel you haven't questioned yet.

#marketingbudget #financialplanning #marketingops #foundermarketing #businessnumbers #marketingstrategy #startupgrowth`},

{day:4,defPal:'cr',pills:['MQL / SQL','GTM'],
 cvScript:'Marketing says 200.',cvBebas:'SALES SAYS 3.',cvTag:'Neither is lying.',subniche:'Agency Reality · GTM',
 setup:{label:'THE SITUATION',body:"The handoff between marketing and sales is where revenue dies. Not because teams are incompetent — because they're measuring different things against definitions nobody agreed on."},
 prob:{head:'NO SHARED DEFINITION. NO ACCOUNTABILITY.',body:"Marketing counts form fills. Sales counts qualified conversations. Until those definitions are written and signed, both teams are right and nothing improves."},
 stat:{num:'36%',label:'HIGHER CLOSE RATES WITH A SIGNED SLA',ctx:"Companies with a formal Sales & Marketing SLA see up to 36% higher lead-to-close rates. Most SMBs have never written one. The document forces the conversation."},
 shift:{head:'MQL/SQL ISN\'T A CRM CATEGORY. IT\'S A BUSINESS AGREEMENT.',body:"The SLA doesn't create alignment. It creates accountability. That's why most companies resist writing it — and why the ones that do outperform."},
 close:{prin:'The argument about lead quality is always an argument about definitions.',cta:'Follow if you like thinking like this.'},
 caption:`Marketing says 200 leads. Sales says 3 were real. Neither is lying.

The conflict between marketing and sales is almost always a definitions problem. Both teams are measuring output against criteria the other team never agreed to. That's not a performance problem — it's a structural one.

Companies with a formal Sales & Marketing SLA see up to 36% higher lead-to-close rates. Most SMBs have never written one. The document forces the conversation both sides have been avoiding.

MQL/SQL isn't a CRM category. It's a business agreement.

#salesmarketing #gtm #leadqualification #b2bsales #revenueoperations #founderlessons #marketingstrategy`},

{day:5,defPal:'bk',pills:['AI ANALYSIS','CUSTOMER DATA'],
 cvScript:'50 reviews.',cvBebas:'3-MONTH STUDY.',cvTag:'Which would you choose?',subniche:'AI in Marketing · Strategy',
 setup:{label:'THE SITUATION',body:"Your customers have already told you what's wrong. The reviews exist. The problem is that founders read them one at a time, form opinions from outliers, and miss the patterns."},
 prob:{head:'ANECDOTES ARE NOT STRATEGY.',body:'One negative review is a data point. Ten with the same theme is a signal. Without pattern recognition at scale, you manage impressions — not reality.'},
 stat:{num:'90M',label:'MINUTES TO ANALYSE 50 REVIEWS WITH AI',ctx:"Batch 10 reviews through AI. Ask for sentiment, primary theme, and a key quote per review. Process all 50 in under 90 minutes. Same insight as a 3-month brand study."},
 shift:{head:'THE TOP 3 NEGATIVE THEMES ARE YOUR NEXT SPRINT.',body:"Not your next brand campaign. The review section is the cheapest market research you're ignoring. And your customers wrote it without being asked."},
 close:{prin:'Your customers already wrote the brief. You just haven\'t read it systematically.',cta:'Follow if you like thinking like this.'},
 caption:`50 reviews contain more insight than a 3-month brand study.

Your customers have already told you what's wrong. The reviews exist. The problem is that founders read them one at a time, form opinions from outliers, and miss the patterns that actually matter.

Batch 10 reviews through AI. Ask for sentiment, primary theme, and a key quote per review. Process all 50 in under 90 minutes. The top 3 negative themes are your next product sprint — not your next brand campaign.

The review section is the cheapest market research you're ignoring.

#customerinsights #aimarketing #productmarketing #voiceofcustomer #startupmarketing #marketingdata #businessgrowth`},

{day:6,defPal:'cr',pills:['COMPETITIVE INTEL','STRATEGY'],
 cvScript:'Your competitor',cvBebas:'MOVED LAST WEEK.',cvTag:'Did you know?',subniche:'Startup Blind Spots',
 setup:{label:'THE SITUATION',body:"Most founders do competitive research once a year. At strategy time. Then they forget. The market doesn't work on that schedule. Your competitors don't either."},
 prob:{head:'3 MONTHS LATE IS TOO LATE.',body:'Pricing changes, new features, job postings — each signals what\'s coming. By the time it appears in your feed, the competitor is three moves ahead of where your analysis left them.'},
 stat:{num:'25',label:'ALERTS TO SET UP A MONITORING SYSTEM',ctx:"5 competitors × 5 monitoring topics = 25 Google Alerts. One automated workflow aggregates them every Monday into a decision-ready brief. Setup time: under 3 hours."},
 shift:{head:'COMPETITIVE ADVANTAGE IS ABOUT SEEING MOVES EARLIER.',body:"Not having better ideas. The brief is automated. The decision still needs you. But you can't decide on intelligence you don't have."},
 close:{prin:'By the time it hits your timeline, it\'s already old news.',cta:'Follow if you like thinking like this.'},
 caption:`Your competitor launched something last week. Did you know?

Most founders do competitive research once a year — at strategy time — then forget. Pricing changes, new feature launches, hiring signals — these are moves you should be seeing in real time, not months later.

25 Google Alerts + one automated workflow = a competitive intelligence brief in your inbox every Monday. Setup time: under 3 hours. Running cost: zero.

}

function buildCover(c){

function buildSetup(c,n,tot){

}

function buildShift(c,n,tot){
  const p=pal(c);
  const fs = c.shift.head.length > 35 ? 38 : 46;
  return `<div class="slide ${p} s-int">

    <div style="height:1px;width:48px;margin-bottom:20px;position:relative;z-index:2;" class="hline"></div>
    <h2 style="font-family:'Bebas Neue',sans-serif;font-size:${fs}px;line-height:.93;letter-spacing:.01em;position:relative;z-index:2;margin-bottom:18px;" class="tp">${c.shift.head}</h2>
    <p style="font-family:'DM Sans',sans-serif;font-size:15px;line-height:1.65;position:relative;z-index:2;" class="ts">${c.shift.body}</p>
  </div>`;
}

function buildClose(c,n,tot){
  const p=pal(c);
  return `<div class="slide ${p} s-int" style="position:relative;">
    ${cornerSVG(p)}${brandBtm(p)}
    <p style="font-family:'Playfair Display',serif;font-style:italic;font-weight:700;font-size:23px;line-height:1.45;margin-bottom:26px;position:relative;z-index:2;" class="tp">${c.close.prin}</p>
    <div style="height:1px;width:40px;margin-bottom:18px;position:relative;z-index:2;" class="hline"></div>
    <p style="font-family:'DM Sans',sans-serif;font-size:12px;letter-spacing:.04em;position:relative;z-index:2;" class="tm">${c.close.cta}</p>
  </div>`;
}

function buildSlides(c){
  const slides = [
    buildCover(c),
    buildSetup(c,2,6),
    buildProb(c,3,6),
    buildStat(c,4,6),
    buildShift(c,5,6),
    buildClose(c,6,6)
  ];
  // Mark only first as active
  return slides.map((s,i)=>{
    if(i===0) return s; // already has 'on'
    return s.replace('display:flex;','display:none;');
  }).join('');
}

If your pages do not rank, your paid ads are carrying a job your content should be doing for free.

#ecommercemarketing #seo #productmarketing #aimarketing #digitalmarketing`,

`Churn does not happen on cancellation day.

It happens 60 days earlier — in the behaviour that precedes it. No login. Rising tickets. Low NPS. The signals exist. Most companies never look.

5 variables. 0–10 risk score per account. Top 25% flagged for intervention. No machine learning required — just a CSV export and a scoring formula.

The account you lose next month already has a score. You just have not built the model.

#customerretention #churnprevention #saasmarketing #businessgrowth #marketingstrategy`,

`Most QBR decks open with last quarter's wins.

That is the least useful thing in the room. Everyone already knows the result.

6 deal health criteria. Scored 0–6. Below 2 = At Risk. The QBR should answer one question: what are we doing about the 10 deals most likely to slip?

A review without an intervention plan is just a record of what happened.

#salesstrategy #qbr #b2bsales #pipelinemanagement #salesmanagement`,

`Most marketing budgets are built on last year's spend.

Not this year's outcomes. The board does not want to know what you spent — they want to know what you will get.

3 scenarios: Bear (−20%), Base, Bull (+20%). ROI per channel: (Revenue − Spend) ÷ Spend. Any channel under 1.0× gets questioned before the year starts.

If you cannot model 3 outcomes from your budget, you are not managing it. You are guessing.

#marketingROI #marketingbudget #businessstrategy #founderlessons #marketingnumbers`,

`For most of the last decade, social media drove traffic to a website.

That handoff is disappearing.

Social commerce GMV is projected to surpass Rs. 7 trillion globally by 2026. Fastest-growing segment: impulse purchases under Rs. 5,000. The funnel compressed into one screen.

If your conversion requires leaving the platform, you are adding friction your competitor is not.

#socialcommerce #ecommercemarketing #digitalmarketing #2026marketing #marketingstrategy`,

`Your content team has 4 writers. Your brand sounds like 6 different people.

Not a talent problem. A process problem.

5 brand voice attributes. AI scores each piece before it reaches a human editor. Flagged phrases, rewrite alternatives, overall score. Review time drops 40%.

Consistency is not a talent. It is a system.

#brandmarketing #contentmarketing #brandvoice #aimarketing #marketingstrategy`,

`Cost-plus pricing is the default.

You add margin to cost, set a price, and call it done. It is also the floor of what you could be charging.

Value-based pricing starts with the outcome: this saves you Rs. 2,00,000 per year. Price at Rs. 30,000 against that context — the conversation changes entirely.

The gap between what you charge and what it is worth is a positioning gap, not a product gap.

#pricingstrategy #businessgrowth #marketingstrategy #founderlessons #gtm`,

`10,000 free users. 90 paying.

Most SaaS founders treat that as a product problem. The product is usually fine. The architecture is not.

Freemium only works when the free tier creates the habit and the paid tier creates the outcome. Most products give too much free.

The upgrade decision is not made at the paywall. It is made the moment a free user hits their limit.

#saasmarketing #freemium #pricingstrategy #productmarketing #startuplessons`,

`1 million followers. 0.1% engagement.

Brands pay for reach. Until you calculate how many followers actually see the post — and act on it — the number is cosmetic.

Micro-influencer benchmark: 5K–50K followers, 3–6% engagement. An audience that acts. Consistently outperforms macro across every category.

The size of the audience matters less than its willingness to move.

#influencermarketing #socialmediastrategy #marketingstrategy #brandmarketing #digitalmarketing`,

`Third-party cookies are gone.

Brands relying on pixel-based retargeting are seeing attribution degrade and CAC rise. The platform tracked your customers for you — and that infrastructure is breaking down.

First-party data: emails, purchase history, preferences. It is yours. It does not deprecate with a browser update.

Own the data. Rent the distribution. Not the other way around.

#firstpartydata #digitalmarketing #marketingstrategy #2026marketing #founderlessons`,

`Most sales comp plans are modelled at 100% attainment.

Nobody asks what the cost looks like at 80%. Or what happens to margin when accelerators kick in at 120%.

3-scenario model: 80%, 100%, 120% attainment. Target comp-to-revenue ratio: 8–15% at 100%. Above 15% — the quota is underbuilt.

Do not announce a comp plan you have not modelled at all three attainment levels.

#salesmanagement #salesstrategy #salescompensation #revenueoperations #businessgrowth`,

`Community-led growth is not a Slack group.

It is a deliberate strategy where customers become the distribution, retention, and acquisition engine simultaneously.

Companies with active customer communities see 26% lower churn and 5× higher NPS. The mechanism: customers with community ties have more to lose by leaving.

The brand that connects its customers to each other is harder to leave than the one that only connects to them alone.

#communitymarketing #customerretention #brandmarketing #businessgrowth #marketingstrategy`,

`Most companies calculate NPS once a quarter and present the number in a board deck.

Then nothing changes.

The number is not the insight — the segment breakdown is. A detractor who receives a personal follow-up call within 48 hours converts to passive 30% of the time. Most brands never make the call.

NPS is a trigger system, not a score.

#customerexperience #nps #customerretention #businessgrowth #marketingstrategy`,

`70% of carts are abandoned. Most brands recover under 5%.

The customer found the product, added it, and left. The intent was there. The recovery system was not built.

3-email sequence: within 1 hour, 24 hours, 72 hours with a final offer. Sequenced flow recovery rate: 8–15% vs. under 5% for a single generic email.

The customer who almost bought is closer to yes than the one who has not found you yet.

#ecommercemarketing #abandonedcart #emailmarketing #conversionoptimisation #digitalmarketing`,

`Most product launches fail not because the product is bad.

They fail because go-to-market was retrofitted onto the build — designed in the final two weeks, not alongside it.

A launch without a messaging hierarchy, UTM taxonomy, email sequence, and conversion tracking confirmed before day one is not a launch. It is a publish date.

The market does not reward the best product. It rewards the best-distributed one.

#productlaunch #gtm #marketingstrategy #startupmarketing #founderlessons`,

`Most brands treat short-form video as an individual task.

Shoot, edit, post, check views, repeat. Each video is a one-off. Each month starts from zero.

AI-assisted system: 3 pillars → trending topic → scripted in 10 minutes → visual brief → 20 posts per month vs. 8 manually in the same time.

The platform rewards consistency. Consistency requires a system.

#shortformvideo #contentmarketing #instagrammarketing #contentcreation #marketingstrategy`,

`Posting on LinkedIn and running a B2B LinkedIn strategy produce different outputs.

One builds impressions. The other builds pipeline.

5 stages: profile optimised → content pillars → targeted connection strategy → engaged comment flows → DM follow-up sequence. Each stage is a system, not a habit.

LinkedIn is a pipeline tool that looks like a social media platform. Is your CRM getting entries from it?

#linkedinmarketing #b2bmarketing #demandgeneration #socialselling #businessgrowth`,

`Every lost deal is a data point.

Most companies collect zero of it systematically. The loss reason in the CRM says price or competition. That is a category. Not intelligence.

Battle card: competitor positioning, known weaknesses, standard objections, counter per objection, win stories. One page. Updated quarterly from closed-lost data.

The loss you do not learn from is the one you repeat.

#salesstrategy #competitiveintelligence #b2bsales #salesenablement #businessgrowth`,

`Last-click attribution assigns 100% of conversion credit to the final touchpoint.

In a multi-channel buyer journey, that is almost always wrong — and the budget decisions that follow are wrong too.

6-touchpoint B2B journey: LinkedIn → search → blog → email → retargeting → close. Last-click credits retargeting. The blog that built intent gets zero.

The model you use to measure is the model you use to decide. Get it right first.

#marketingattribution #digitalmarketing #marketingnumbers #b2bmarketing #marketingstrategy`,

`Marketing says leads are good. Sales says leads are bad.

Neither is wrong. Both are measuring against criteria the other team did not agree to.

Companies with a formal Sales and Marketing SLA see 34% higher lead-to-close rates. Most SMBs have never written one — because the conversation it forces is the one both teams have been avoiding.

The SLA does not create alignment. It creates accountability.

#salesandmarketing #revenueoperations #b2bmarketing #gtm #businessgrowth`
];

function showCaption(i){
  const el = document.getElementById('captext');
  if(el) el.textContent = CAPTIONS[i] || '';
}

function copyCaption(){
  const txt = document.getElementById('captext').textContent;
  navigator.clipboard.writeText(txt).then(()=>{
    const c = document.getElementById('capcopied');
    c.classList.add('show');
    setTimeout(()=>c.classList.remove('show'), 2000);
  });
}

// ---- INDEX ----
function buildIndex(){
  const g=document.getElementById('grid');
  g.innerHTML=DATA.map((c,i)=>{
    const pCls = c.defPal==='bk'?'pal-b':'pal-c';
    return `<div class="card" onclick="openCarousel(${i})">
      <div class="card-day">DAY ${c.day < 10 ? '0'+c.day : c.day} / 30 &nbsp;<span class="card-pal ${pCls}"></span></div>
      <div class="card-hl">${c.cvScript} ${c.cvBebas}${c.cvTag?' '+c.cvTag:''}</div>
      <div class="card-sub">${c.subniche}</div>
    </div>`;
  }).join('');
}

// ---- OPEN / NAVIGATE ----
function openCarousel(i){
  curC=i; curS=0; curPal=null;
  const c=DATA[i];
  document.getElementById('idx').style.display='none';
  const v=document.getElementById('vwr');
  v.style.display='flex';

  document.getElementById('vday').textContent=`DAY ${c.day < 10 ? '0'+c.day : c.day} / 30`;
  document.getElementById('vtitle').textContent=`${c.cvScript} ${c.cvBebas}`;

  // Set palette buttons
  const p=c.defPal;
  document.getElementById('pbk').classList.toggle('on',p==='bk');
  document.getElementById('pcr').classList.toggle('on',p==='cr');

  // Build slides
  document.getElementById('sw').innerHTML=buildSlides(c);
  buildDots(6);
  updateCtrl();
  renderCaption(i);
  showCaption(i);
}

function setPal(p){
  curPal=p;
  document.getElementById('pbk').classList.toggle('on',p==='bk');
  document.getElementById('pcr').classList.toggle('on',p==='cr');
  const s=curS;
  openCarousel(curC);
  curPal=p;
  goToSlide(s);
}

function goToSlide(n){
  const sw=document.getElementById('sw');
  const slides=sw.querySelectorAll('.slide');
  slides.forEach((s,i)=>{
    s.style.display=i===n?'flex':'none';
    s.classList.toggle('on',i===n);
  });
  curS=n;
  updateDots();
  updateCtrl();
}

function nextS(){ if(curS<5) goToSlide(curS+1); }
function prevS(){ if(curS>0) goToSlide(curS-1); }
function updateCtrl(){
  document.getElementById('bp').disabled=curS===0;
  document.getElementById('bn').disabled=curS===5;
  document.getElementById('cpb').disabled=curC===0;
  document.getElementById('cnb').disabled=curC===DATA.length-1;
  document.getElementById('ccount').textContent=`${curC+1} / ${DATA.length}`;
  if(document.getElementById('img-filename')) updateFilename();
}
function buildDots(n){
  document.getElementById('dots').innerHTML=[...Array(n)].map((_,i)=>`<div class="dot ${i===0?'on':''}" onclick="goToSlide(${i})"></div>`).join('');
}
function updateDots(){
  document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('on',i===curS));
}
function prevC(){ if(curC>0) openCarousel(curC-1); }
function nextC(){ if(curC<DATA.length-1) openCarousel(curC+1); }
function showIdx(){
  document.getElementById('idx').style.display='block';
  document.getElementById('vwr').style.display='none';
  curPal=null;
}

function renderCaption(i){
  const c=DATA[i];
  document.getElementById('captext').textContent=c.caption||'';
}

function copyCaption(){
  const c=DATA[curC];
  if(!c.caption) return;
  navigator.clipboard.writeText(c.caption).then(()=>{
    const el=document.getElementById('capcopied');
    el.classList.add('show');
    setTimeout(()=>el.classList.remove('show'),2000);
  });
}

// Keyboard
document.addEventListener('keydown',e=>{
  if(document.getElementById('vwr').style.display==='flex'){
    if(e.key==='ArrowRight') nextS();
    if(e.key==='ArrowLeft') prevS();
    if(e.key==='Escape') showIdx();
  }
});

// ===== SLIDE NAMES =====
const SLIDE_NAMES = ['cover','setup','problem','stat','shift','close'];

function getFilename(ext){
  const c = DATA[curC];
  const day = String(c.day).padStart(2,'0');
  const slideNum = String(curS+1);
  const slideName = SLIDE_NAMES[curS];
  return `haseebch49_day${day}_slide${slideNum}_${slideName}.${ext}`;
}

function updateFilename(){
  const el = document.getElementById('img-filename');
  if(el) el.textContent = getFilename('png');
}

// Collect all local CSS text from the page
function getAllCSS(){
  let css = '';
  for(const sheet of document.styleSheets){
    try {
      for(const rule of sheet.cssRules) css += rule.cssText + '\n';
    } catch(e){}
  }
  return css;
}

async function captureSlide(){
  const sw = document.getElementById('sw');
  const activeSlide = sw.querySelector('.slide.on');
  if(!activeSlide) return null;

  // Wait for all fonts to be ready
  await document.fonts.ready;

  // Build an isolated render div positioned offscreen
  const wrap = document.createElement('div');
  wrap.style.cssText = 'position:fixed;left:-9999px;top:0;width:540px;height:540px;overflow:hidden;pointer-events:none;z-index:-1;';
  
  // Clone the slide and reset positioning so html2canvas sees it as a normal block
  const clone = activeSlide.cloneNode(true);
  clone.style.cssText = [
    'display:flex !important',
    'position:relative !important',
    'top:0 !important',
    'left:0 !important',
    'width:540px !important',
    'height:540px !important',
    'overflow:hidden !important',
    'flex-direction:column !important'
  ].join(';');

  wrap.appendChild(clone);
  document.body.appendChild(wrap);

  // Short settle time for layout + fonts
  await new Promise(r => setTimeout(r, 120));

  let canvas;
  try {
    canvas = await html2canvas(clone, {
      width: 540,
      height: 540,
      scale: 2,
      useCORS: true,
      allowTaint: true,
      logging: false,
      removeContainer: true
    });
  } finally {
    document.body.removeChild(wrap);
  }
  return canvas;
}

function setBtn(id, html){ document.getElementById(id).innerHTML = html; document.getElementById(id).disabled = false; }

const COPY_BTN_HTML = `<svg width="12" height="12" viewBox="0 0 16 16" fill="none"><rect x="5" y="5" width="10" height="10" rx="1.5" stroke="currentColor" stroke-width="1.4"/><path d="M3 11H2a1 1 0 01-1-1V2a1 1 0 011-1h8a1 1 0 011 1v1" stroke="currentColor" stroke-width="1.4"/></svg> COPY IMAGE`;
const DL_BTN_HTML   = `<svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M8 2v8M5 7l3 3 3-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M2 12h12" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg> DOWNLOAD`;

function showFeedback(msg){
  const fb = document.getElementById('img-feedback');
  fb.textContent = msg;
  fb.classList.add('show');
  setTimeout(()=>fb.classList.remove('show'), 2500);
}

function triggerDownload(canvas){
  const link = document.createElement('a');
  link.download = getFilename('png');
  link.href = canvas.toDataURL('image/png');
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}

async function copySlideImage(){
  const btn = document.getElementById('btn-copy-img');
  btn.disabled = true;
  btn.innerHTML = '⏳ RENDERING...';
  try {
    const canvas = await captureSlide();
    if(!canvas){ setBtn('btn-copy-img', COPY_BTN_HTML); return; }

    // Try native clipboard API first
    let copied = false;
    if(window.ClipboardItem){
      try {
        const blob = await new Promise(res => canvas.toBlob(res, 'image/png'));
        await navigator.clipboard.write([new ClipboardItem({'image/png': blob})]);
        showFeedback('✓ COPIED TO CLIPBOARD');
        copied = true;
      } catch(e){ /* fall through to download */ }
    }
    // Fallback: download
    if(!copied){
      triggerDownload(canvas);
      showFeedback('↓ SAVED — clipboard blocked by browser');
    }
  } catch(err){
    showFeedback('✗ ERROR — try DOWNLOAD instead');
    console.error(err);
  }
  setBtn('btn-copy-img', COPY_BTN_HTML);
}

async function downloadSlideImage(){
  const btn = document.getElementById('btn-dl-img');
  btn.disabled = true;
  btn.innerHTML = '⏳ RENDERING...';
  try {
    const canvas = await captureSlide();
    if(canvas){
      triggerDownload(canvas);
      showFeedback('↓ DOWNLOADED');
    }
  } catch(err){
    showFeedback('✗ ERROR — try again');
    console.error(err);
  }
  setBtn('btn-dl-img', DL_BTN_HTML);
}

// Init
buildIndex();
</script>
